<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4D Connect — KensGames</title>
  <link rel="icon" href="/assets/masterImageFile/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/lib/fonts/fonts.css">
  <style>
    :root {
      --bg: #000008;
      --cyan: #00ddff;
      --purple: #bb00ff;
      --p1: #2255ff;
      --p2: #ff2200;
      --gold: #ffbb00;
      --text: #ddeeff;
      --dim: #445566;
      --glass: rgba(1, 2, 14, 0.84);
      --gborder: rgba(0, 180, 255, 0.16);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', 'Segoe UI', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #c {
      display: block;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      background: rgba(0, 0, 10, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gborder);
      pointer-events: auto;
    }

    .nav-logo {
      color: var(--cyan);
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 14px;
      list-style: none;
    }

    .nav-links a {
      color: var(--dim);
      font-size: 11px;
      text-decoration: none;
      letter-spacing: 1px;
      transition: color .2s;
    }

    .nav-links a:hover {
      color: var(--cyan);
    }

    .player-panel {
      position: fixed;
      top: 48px;
      width: 152px;
      bottom: 108px;
      background: var(--glass);
      backdrop-filter: blur(14px);
      border-radius: 10px;
      padding: 12px 10px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 7px;
      border: 1px solid var(--gborder);
      pointer-events: none;
      transition: border-color .4s, box-shadow .4s;
    }

    .player-panel.p1-panel {
      left: 6px;
      border-left: 3px solid rgba(34, 85, 255, 0.3);
    }

    .player-panel.p2-panel {
      right: 6px;
      border-right: 3px solid rgba(255, 34, 0, 0.3);
    }

    .player-panel.active.p1-panel {
      border-left-color: var(--p1);
      box-shadow: 0 0 28px rgba(34, 85, 255, 0.22);
    }

    .player-panel.active.p2-panel {
      border-right-color: var(--p2);
      box-shadow: 0 0 28px rgba(255, 34, 0, 0.22);
    }

    .panel-badge {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      border: 2px solid;
      position: relative;
    }

    .p1-badge {
      background: radial-gradient(circle, #1144cc 0%, #000820 100%);
      border-color: var(--p1);
      color: var(--p1);
      box-shadow: 0 0 14px rgba(34, 85, 255, 0.55);
    }

    .p2-badge {
      background: radial-gradient(circle, #bb2200 0%, #180000 100%);
      border-color: var(--p2);
      color: var(--p2);
      box-shadow: 0 0 14px rgba(255, 34, 0, 0.55);
    }

    .panel-badge.pulse::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid currentColor;
      animation: badge-ring 1.5s ease-in-out infinite;
    }

    @keyframes badge-ring {

      0%,
      100% {
        opacity: .9;
        transform: scale(1)
      }

      50% {
        opacity: .2;
        transform: scale(1.28)
      }
    }

    .panel-name {
      text-align: center;
      font-family: 'Orbitron', monospace;
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--dim);
    }

    .panel-score {
      text-align: center;
      font-size: 38px;
      font-weight: 900;
      line-height: 1;
    }

    .p1-score {
      color: var(--p1);
      text-shadow: 0 0 14px rgba(34, 85, 255, 0.6);
    }

    .p2-score {
      color: var(--p2);
      text-shadow: 0 0 14px rgba(255, 34, 0, 0.6);
    }

    .panel-div {
      border: none;
      border-top: 1px solid rgba(100, 140, 180, 0.1);
    }

    .panel-stat {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
    }

    .stat-lbl {
      color: var(--dim);
      letter-spacing: 1px;
      font-size: 9px;
    }

    .stat-v1 {
      color: rgba(100, 150, 255, .9);
      font-weight: 700;
    }

    .stat-v2 {
      color: rgba(255, 100, 80, .9);
      font-weight: 700;
    }

    .panel-log-lbl {
      font-size: 7px;
      color: var(--dim);
      letter-spacing: 2px;
      text-align: center;
      margin-top: 2px;
    }

    .panel-log {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column-reverse;
      gap: 2px;
    }

    .log-entry {
      font-size: 8px;
      color: rgba(150, 170, 200, .6);
      letter-spacing: .5px;
      padding: 2px 4px;
      background: rgba(255, 255, 255, .02);
      border-radius: 2px;
    }

    .panel-mode {
      margin-top: auto;
      text-align: center;
      font-size: 7px;
      letter-spacing: 1px;
      padding: 4px;
      border-radius: 4px;
      border: 1px solid rgba(140, 60, 255, .25);
      color: rgba(180, 100, 255, .9);
      background: rgba(80, 0, 140, .1);
    }

    #hud-top {
      position: fixed;
      top: 44px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 7px 22px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      border-radius: 0 0 10px 10px;
      border: 1px solid var(--gborder);
      border-top: none;
      pointer-events: none;
      min-width: 180px;
    }

    #scenario-tag {
      font-family: 'Orbitron', monospace;
      font-size: 7px;
      color: var(--purple);
      letter-spacing: 3px;
    }

    #turn-indicator {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      letter-spacing: 2px;
    }

    #turn-timer {
      font-size: 9px;
      letter-spacing: 1px;
      min-height: 14px;
    }

    #col-grid {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      pointer-events: auto;
      background: rgba(0, 1, 10, .82);
      backdrop-filter: blur(12px);
      border: 1px solid var(--gborder);
      border-radius: 10px;
      padding: 7px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    #cg-label {
      font-family: 'Orbitron', monospace;
      font-size: 7px;
      color: var(--dim);
      letter-spacing: 2px;
    }

    .cg-row {
      display: flex;
      gap: 4px;
    }

    .drop-btn {
      width: 40px;
      height: 34px;
      background: rgba(0, 160, 220, .05);
      border: 1px solid rgba(0, 160, 220, .18);
      border-radius: 5px;
      color: var(--cyan);
      font-family: 'Orbitron', monospace;
      font-size: 6px;
      letter-spacing: .5px;
      cursor: pointer;
      transition: all .16s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
    }

    .drop-btn:hover:not(:disabled) {
      background: rgba(0, 180, 240, .18);
      border-color: var(--cyan);
      box-shadow: 0 0 10px rgba(0, 220, 255, .3);
      transform: translateY(-2px);
    }

    .drop-btn.p2b {
      color: var(--p2);
      border-color: rgba(255, 50, 0, .18);
    }

    .drop-btn.p2b:hover:not(:disabled) {
      background: rgba(255, 50, 0, .14);
      border-color: var(--p2);
      box-shadow: 0 0 10px rgba(255, 50, 0, .3);
    }

    .drop-btn:disabled {
      opacity: .15;
      cursor: not-allowed;
      transform: none;
    }

    .drop-btn .da {
      font-size: 13px;
      line-height: 1;
    }

    .drop-btn .dl {
      font-size: 5px;
      color: var(--dim);
    }

    #cam-controls {
      position: fixed;
      top: 50px;
      right: 6px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cam-btn {
      padding: 5px 9px;
      background: rgba(0, 0, 12, .82);
      backdrop-filter: blur(8px);
      border: 1px solid var(--gborder);
      border-radius: 5px;
      color: var(--cyan);
      font-family: 'Orbitron', monospace;
      font-size: 8px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all .2s;
    }

    .cam-btn:hover,
    .cam-btn.on {
      background: rgba(0, 160, 220, .15);
      border-color: var(--cyan);
    }

    #scenario-select {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0, 0, 10, .94);
      backdrop-filter: blur(18px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    #scenario-select.show {
      display: flex;
    }

    .ss-title {
      font-family: 'Orbitron', monospace;
      font-size: 26px;
      letter-spacing: 6px;
      color: var(--cyan);
    }

    .ss-sub {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 2px;
    }

    .ss-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      max-width: 660px;
      width: 100%;
      padding: 0 18px;
    }

    .ss-card {
      padding: 14px 10px;
      border: 1px solid rgba(100, 40, 200, .25);
      border-radius: 8px;
      background: rgba(8, 4, 22, .88);
      cursor: pointer;
      transition: all .2s;
      text-align: center;
      user-select: none;
    }

    .ss-card:hover,
    .ss-card.sel {
      border-color: var(--purple);
      background: rgba(70, 0, 110, .28);
      transform: translateY(-3px);
      box-shadow: 0 8px 26px rgba(150, 0, 255, .2);
    }

    .ss-card.sel {
      box-shadow: 0 0 0 2px var(--purple), 0 8px 26px rgba(150, 0, 255, .3);
    }

    .ss-icon {
      font-size: 26px;
      margin-bottom: 6px;
    }

    .ss-name {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--cyan);
      margin-bottom: 4px;
    }

    .ss-desc {
      font-size: 8px;
      color: var(--dim);
      line-height: 1.5;
      white-space: pre-line;
    }

    .ss-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .ss-vs-btn {
      padding: 9px 24px;
      border-radius: 6px;
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      border: 1px solid;
      transition: all .2s;
    }

    .pvp-btn {
      color: var(--cyan);
      border-color: rgba(0, 200, 255, .3);
      background: rgba(0, 200, 255, .06);
    }

    .pvp-btn:hover,
    .pvp-btn.sel {
      background: rgba(0, 200, 255, .16);
    }

    .ai-btn {
      color: var(--purple);
      border-color: rgba(180, 0, 255, .3);
      background: rgba(180, 0, 255, .06);
    }

    .ai-btn:hover,
    .ai-btn.sel {
      background: rgba(180, 0, 255, .16);
    }

    .ss-diff-row {
      display: none;
      gap: 8px;
    }

    .ss-diff-row.show {
      display: flex;
    }

    .diff-btn {
      padding: 6px 14px;
      border-radius: 5px;
      font-family: 'Orbitron', monospace;
      font-size: 8px;
      letter-spacing: 1px;
      cursor: pointer;
      border: 1px solid rgba(200, 120, 0, .25);
      background: rgba(200, 100, 0, .05);
      color: #ffaa44;
      transition: all .2s;
    }

    .diff-btn:hover,
    .diff-btn.sel {
      background: rgba(200, 100, 0, .18);
      border-color: #ffaa44;
    }

    .launch-btn {
      padding: 12px 36px;
      background: linear-gradient(90deg, rgba(0, 180, 255, .15), rgba(150, 0, 255, .15));
      border: 1px solid rgba(100, 100, 255, .35);
      border-radius: 7px;
      color: #aaddff;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all .25s;
    }

    .launch-btn:hover {
      background: linear-gradient(90deg, rgba(0, 180, 255, .28), rgba(150, 0, 255, .28));
      box-shadow: 0 0 24px rgba(100, 100, 255, .3);
    }

    #result-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 400;
      background: rgba(0, 0, 10, .9);
      backdrop-filter: blur(14px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    #result-overlay.show {
      display: flex;
    }

    #result-title {
      font-family: 'Orbitron', monospace;
      font-size: 2.8em;
      letter-spacing: 5px;
      text-align: center;
      animation: pop-in .55s cubic-bezier(.2, 1.6, .4, 1) both;
    }

    #result-line {
      font-size: .85em;
      color: #aabbcc;
      letter-spacing: 1px;
    }

    #result-tally {
      font-size: .7em;
      color: var(--dim);
      letter-spacing: 1px;
    }

    @keyframes pop-in {
      from {
        transform: scale(.4);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .r-btn-row {
      display: flex;
      gap: 12px;
      margin-top: 6px;
    }

    .r-btn {
      padding: 10px 22px;
      border-radius: 6px;
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all .2s;
      border: 1px solid;
    }

    .r-btn.ok {
      color: var(--cyan);
      border-color: rgba(0, 200, 255, .3);
      background: rgba(0, 200, 255, .07);
    }

    .r-btn.ok:hover {
      background: rgba(0, 200, 255, .2);
    }

    .r-btn.alt {
      color: var(--purple);
      border-color: rgba(180, 0, 255, .3);
      background: rgba(180, 0, 255, .06);
    }

    .r-btn.alt:hover {
      background: rgba(180, 0, 255, .18);
    }

    #preloader {
      position: fixed;
      inset: 0;
      z-index: 600;
      background: #000008;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transition: opacity .8s;
    }

    .pre-t {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      letter-spacing: 5px;
      color: var(--cyan);
    }

    .pre-s {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 2px;
    }

    .pre-bar-w {
      width: 200px;
      height: 2px;
      background: rgba(0, 200, 255, .12);
      border-radius: 2px;
      overflow: hidden;
    }

    .pre-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      width: 0;
      transition: width .35s;
      border-radius: 2px;
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <nav class="nav">
    <a href="/" class="nav-logo">KEN<span style="color:#fff">S</span>GAMES</a>
    <ul class="nav-links">
      <li><a href="/4dtictactoe/lobby/" style="color:var(--cyan);font-weight:700">&#8592; LOBBY</a></li>
      <li><a href="/">Portal</a></li>
      <li><a href="/starfighter/lobby/">Alien Attack</a></li>
      <li><a href="/fasttrack/lobby/">FastTrack</a></li>
    </ul>
  </nav>
  <div class="player-panel p1-panel active" id="panel-p1">
    <div class="panel-badge p1-badge pulse" id="badge-p1">1</div>
    <div class="panel-name" id="name-p1">PLAYER 1</div>
    <div class="panel-score p1-score" id="score-p1">0</div>
    <hr class="panel-div">
    <div class="panel-stat"><span class="stat-lbl">MOVES</span><span class="stat-v1" id="moves-p1">0</span></div>
    <div class="panel-stat"><span class="stat-lbl">STREAK</span><span class="stat-v1" id="streak-p1">0</span></div>
    <div class="panel-stat"><span class="stat-lbl">THREATS</span><span class="stat-v1" id="combo-p1">0</span></div>
    <div class="panel-log-lbl">LAST MOVES</div>
    <div class="panel-log" id="log-p1"></div>
    <div class="panel-mode" id="mode-p1">CLASSIC</div>
  </div>
  <div class="player-panel p2-panel" id="panel-p2">
    <div class="panel-badge p2-badge" id="badge-p2">2</div>
    <div class="panel-name" id="name-p2">PLAYER 2</div>
    <div class="panel-score p2-score" id="score-p2">0</div>
    <hr class="panel-div">
    <div class="panel-stat"><span class="stat-lbl">MOVES</span><span class="stat-v2" id="moves-p2">0</span></div>
    <div class="panel-stat"><span class="stat-lbl">STREAK</span><span class="stat-v2" id="streak-p2">0</span></div>
    <div class="panel-stat"><span class="stat-lbl">THREATS</span><span class="stat-v2" id="combo-p2">0</span></div>
    <div class="panel-log-lbl">LAST MOVES</div>
    <div class="panel-log" id="log-p2"></div>
    <div class="panel-mode" id="mode-p2">CLASSIC</div>
  </div>
  <div id="hud-top">
    <div id="scenario-tag">CLASSIC 4D</div>
    <div id="turn-indicator" style="color:var(--p1)">&#9899; PLAYER 1</div>
    <div id="turn-timer"></div>
  </div>
  <div id="col-grid">
    <div id="cg-label">DROP COLUMN</div>
    <div id="cg-rows"></div>
  </div>
  <div id="cam-controls">
    <button class="cam-btn on" id="btn-cama" onclick="setCam('A')">CAM A</button>
    <button class="cam-btn" id="btn-camb" onclick="setCam('B')">CAM B</button>
    <button class="cam-btn" id="btn-follow" onclick="toggleFollow()">FOLLOW</button>
    <button class="cam-btn" onclick="resetCam()">RESET</button>
  </div>
  <div id="scenario-select" class="show">
    <div class="ss-title">4D CONNECT</div>
    <div class="ss-sub">CHOOSE YOUR CHALLENGE</div>
    <div class="ss-grid" id="ss-grid"></div>
    <div class="ss-row">
      <button class="ss-vs-btn pvp-btn sel" id="pvp-btn" onclick="setVsMode('pvp')">&#9889; VS PLAYER</button>
      <button class="ss-vs-btn ai-btn" id="ai-btn" onclick="setVsMode('ai')">VS AI</button>
    </div>
    <div class="ss-diff-row" id="diff-row">
      <span style="font-size:8px;color:var(--dim);letter-spacing:1px;align-self:center">AI:</span>
      <button class="diff-btn sel" id="diff-easy" onclick="setDiff('easy')">EASY</button>
      <button class="diff-btn" id="diff-med" onclick="setDiff('medium')">MEDIUM</button>
      <button class="diff-btn" id="diff-hard" onclick="setDiff('hard')">HARD</button>
    </div>
    <button class="launch-btn" onclick="startGame()">LAUNCH &#8594;</button>
  </div>
  <div id="result-overlay">
    <div id="result-title"></div>
    <div id="result-line"></div>
    <div id="result-tally"></div>
    <div class="r-btn-row">
      <button class="r-btn ok" onclick="rematch()">REMATCH</button>
      <button class="r-btn alt" onclick="showScenarioSelect()">NEW SCENARIO</button>
    </div>
  </div>
  <div id="preloader">
    <div class="pre-t">4D CONNECT</div>
    <div class="pre-s" id="pre-msg">INITIALISING UNIVERSE...</div>
    <div class="pre-bar-w">
      <div class="pre-bar" id="pre-bar"></div>
    </div>
  </div>
  <script src="/lib/three/three.min.js"></script>
  <script src="/lib/three/GLTFLoader.js"></script>
  <script src="/js/manifold_bridge.js"></script>
  <script src="/4dtictactoe/board_manifold_substrate.js"></script>
  <script>
    'use strict';
    const TRNG = { _b: new Uint32Array(16), _i: 16, _r() { crypto.getRandomValues(this._b); this._i = 0; }, f() { if (this._i >= 16) this._r(); return this._b[this._i++] / 0xFFFFFFFF; }, i(a, b) { return Math.floor(this.f() * (b - a + 1)) + a; }, pick(a) { return a[this.i(0, a.length - 1)]; }, shuffle(a) { const r = [...a]; for (let i = r.length - 1; i > 0; i--) { const j = this.i(0, i);[r[i], r[j]] = [r[j], r[i]]; } return r; } };
    const SCENARIOS = [

    canvas.addEventListener('touchmove', e => { if (!cDrag) return; camTheta -= (e.touches[0].clientX - cLX) * 0.007; cLX = e.touches[0].clientX; camPhi = Math.max(0.08, Math.min(Math.PI - .08, camPhi + (e.touches[0].clientY - cLY) * 0.007)); cLY = e.touches[0].clientY; camPosT.set(camTarget.x + camRadius * Math.sin(camPhi) * Math.sin(camTheta), camTarget.y + camRadius * Math.cos(camPhi), camTarget.z + camRadius * Math.sin(camPhi) * Math.cos(camTheta)); }, { passive: true });
    function aiPickColumn() { const cols = []; for (let gz = 0; gz < G; gz++)for (let gx = 0; gx < G; gx++)if (!colFull(gx, gz)) cols.push([gx, gz]); if (!cols.length) return null; if (aiDiff === 'easy' || TRNG.f() < 0.18) return TRNG.pick(cols); for (const [gx, gz] of TRNG.shuffle(cols)) { const gy = lowestFree(gx, gz); const snap = snapBoard(); scell(gx, gy, gz, currentPlayer); const win = checkWin(currentPlayer); restoreBoard(snap); if (win) return [gx, gz]; } const opp = currentPlayer === P1 ? P2 : P1; for (const [gx, gz] of TRNG.shuffle(cols)) { const gy = lowestFree(gx, gz); const snap = snapBoard(); scell(gx, gy, gz, opp); const win = checkWin(opp); restoreBoard(snap); if (win) return [gx, gz]; } if (aiDiff === 'hard') { const scored = cols.map(([gx, gz]) => { const gy = lowestFree(gx, gz); const snap = snapBoard(); scell(gx, gy, gz, currentPlayer); const myT = countThreats(currentPlayer); restoreBoard(snap); scell(gx, gy, gz, opp); const opT = countThreats(opp); restoreBoard(snap); return { gx, gz, score: myT * 2 + opT * 1.5 + (1.5 - Math.abs(gx - 1.5) * 0.2 - Math.abs(gz - 1.5) * 0.2) + TRNG.f() * 0.4 }; }); scored.sort((a, b) => b.score - a.score); return [scored[0].gx, scored[0].gz]; } const scored = cols.map(([gx, gz]) => ({ gx, gz, score: 4 - Math.abs(gx - 1.5) - Math.abs(gz - 1.5) + TRNG.f() })); scored.sort((a, b) => b.score - a.score); return [scored[0].gx, scored[0].gz]; }
    function updateHUD() { const isP1 = currentPlayer === P1; const n1 = document.getElementById('name-p1').textContent, n2 = document.getElementById('name-p2').textContent; document.getElementById('turn-indicator').textContent = `\u25CF ${isP1 ? n1 : n2}`; document.getElementById('turn-indicator').style.color = isP1 ? 'var(--p1)' : 'var(--p2)'; document.getElementById('panel-p1').classList.toggle('active', isP1); document.getElementById('panel-p2').classList.toggle('active', !isP1); document.getElementById('badge-p1').classList.toggle('pulse', isP1); document.getElementById('badge-p2').classList.toggle('pulse', !isP1); document.getElementById('moves-p1').textContent = moveCounts[0]; document.getElementById('moves-p2').textContent = moveCounts[1]; document.getElementById('streak-p1').textContent = streaks[0]; document.getElementById('streak-p2').textContent = streaks[1]; document.getElementById('combo-p1').textContent = countThreats(P1); document.getElementById('combo-p2').textContent = countThreats(P2); }
    function logMove(p, gx, gz, gy) { const pi = p - 1; moveLogs[pi].unshift(`X${gx + 1}Z${gz + 1}Y${gy + 1}`); if (moveLogs[pi].length > 6) moveLogs[pi].pop(); document.getElementById(`log-p${p}`).innerHTML = moveLogs[pi].map(m => `<div class="log-entry">${m}</div>`).join(''); }
    function showResult(title, sub, tally, color) { document.getElementById('result-title').textContent = title; document.getElementById('result-title').style.color = color; document.getElementById('result-line').textContent = sub; document.getElementById('result-tally').textContent = tally; document.getElementById('result-overlay').classList.add('show'); }
    function buildColUI() { const rows = document.getElementById('cg-rows'); rows.innerHTML = ''; const isP2 = currentPlayer === P2; for (let gz = 0; gz < G; gz++) { const row = document.createElement('div'); row.className = 'cg-row'; for (let gx = 0; gx < G; gx++) { const btn = document.createElement('button'); btn.className = 'drop-btn' + (isP2 ? ' p2b' : ''); btn.innerHTML = `<span class="da">&darr;</span><span class="dl">X${gx + 1}&middot;Z${gz + 1}</span>`; btn.dataset.gx = gx; btn.dataset.gz = gz; btn.disabled = isDropping || isGameOver || colFull(gx, gz); btn.onclick = () => dropBall(gx, gz); row.appendChild(btn); } rows.appendChild(row); } }
    function refreshColBtns() { const isP2 = currentPlayer === P2; document.querySelectorAll('.drop-btn').forEach(btn => { const gx = +btn.dataset.gx, gz = +btn.dataset.gz; btn.disabled = isDropping || isGameOver || colFull(gx, gz); btn.className = 'drop-btn' + (isP2 ? ' p2b' : ''); }); }
    function startTurnTimer() { if (!currentScenario.timer) return; clearTurnTimer(); timerLeft = currentScenario.timer; const el = document.getElementById('turn-timer'); el.style.color = 'var(--cyan)'; el.textContent = timerLeft + 's'; turnTimer = setInterval(() => { timerLeft--; el.textContent = timerLeft + 's'; if (timerLeft <= 3) el.style.color = '#ff4444'; if (timerLeft <= 0) { clearTurnTimer(); const avail = []; for (let gz = 0; gz < G; gz++)for (let gx = 0; gx < G; gx++)if (!colFull(gx, gz)) avail.push([gx, gz]); if (avail.length) { const [gx, gz] = TRNG.pick(avail); dropBall(gx, gz); } } }, 1000); }
    function clearTurnTimer() { if (turnTimer) { clearInterval(turnTimer); turnTimer = null; } document.getElementById('turn-timer').textContent = ''; document.getElementById('turn-timer').style.color = 'var(--cyan)'; }
    function dropBall(gx, gz) { if (isDropping || isGameOver || colFull(gx, gz)) return; clearTurnTimer(); isDropping = true; refreshColBtns(); spawnPhysBall(gx, gz, currentPlayer); if (camFollow) { const tp = nodePos(gx, G, gz); camPosT.set(tp.x * 0.5 + 6, nodePos(gx, G, gz).y + 6, tp.z * 0.5 + 12); camLookT.set(tp.x, 3, tp.z); } }
    function physStep(dt) { if (!physBall || physBall.settled) return; physBall.vy += GRAV * dt; physBall.py += physBall.vy * dt; const floorY = nodePos(physBall.gx, physBall.gy, physBall.gz).y; if (physBall.py <= floorY + BALL_R) { if (Math.abs(physBall.vy) < SETTLE_V) { physBall.py = floorY; physBall.vy = 0; physBall.settled = true; onBallSettled(); return; } physBall.py = floorY + BALL_R; physBall.vy = -physBall.vy * RESTIT * DAMP; } boardGlow.intensity = Math.max(0, 2 - physBall.py * 0.2); physBall.mesh.position.set(physBall.tx, physBall.py, physBall.tz); physBall.halo.position.set(physBall.tx, physBall.py, physBall.tz); if (camFollow) { camLookT.y += (physBall.py - camLookT.y) * 0.1; camPosT.y += (physBall.py + 7 - camPosT.y) * 0.06; } }
    function describeWin(cells, sc) { if (sc.special === 'cube') return 'PERFECT CUBE COMPLETED!'; if (!cells || cells.length < 2) return ''; const [x0, y0, z0] = cells[0], [x1, y1, z1] = cells[1]; const axes = []; if (x1 !== x0) axes.push('X'); if (y1 !== y0) axes.push('Y'); if (z1 !== z0) axes.push('Z'); return `${sc.winLen} IN A ROW \u2014 ${axes.length === 1 ? axes[0] + ' AXIS' : axes.join('/') + ' DIAGONAL'}`; }
    function onBallSettled() { const { gx, gy, gz, p } = physBall; scene.remove(physBall.mesh); scene.remove(physBall.halo); physBall = null; boardGlow.intensity = 0; scell(gx, gy, gz, p); addPlacedBall(gx, gy, gz, p); moveCounts[p - 1]++; logMove(p, gx, gz, gy); emitParticles(nodePos(gx, gy, gz), 28, BCOLS[p].glow); boardGlow.color.setHex(BCOLS[p].glow); boardGlow.intensity = 4; setTimeout(() => { boardGlow.intensity = 0; }, 350); const winCells = checkWin(p); if (winCells) { isGameOver = true; scores[p - 1]++; streaks[p - 1]++; streaks[(p === P1 ? P2 : P1) - 1] = 0; document.getElementById(`score-p${p}`).textContent = scores[p - 1]; showWinGlows(winCells); emitParticles(nodePos(gx, gy, gz), 60, 0xffee00); const winDesc = describeWin(winCells, currentScenario); const n = p === P1 ? document.getElementById('name-p1').textContent : document.getElementById('name-p2').textContent; const hex = '#' + BCOLS[p].glow.toString(16).padStart(6, '0'); setTimeout(() => showResult(`${n} WINS`, winDesc, `P1: ${scores[0]}  |  P2: ${scores[1]}`, hex), 700); if (camFollow) { const cx = winCells.reduce((a, [x]) => a + x / winCells.length, 0), cy = winCells.reduce((a, [, y]) => a + y / winCells.length, 0), cz = winCells.reduce((a, [, , z]) => a + z / winCells.length, 0); const wp = nodePos(cx, cy, cz); camLookT.set(wp.x, wp.y, wp.z); camPosT.set(wp.x + 8, wp.y + 8, wp.z + 14); } isDropping = false; refreshColBtns(); return; } if (boardFull()) { isGameOver = true; if (currentScenario.special === 'territory') { const p1L = countAllLines(P1), p2L = countAllLines(P2); const winner = p1L > p2L ? P1 : p2L > p1L ? P2 : 0; const color = winner === P1 ? '#2255ff' : winner === P2 ? '#ff2200' : '#ffee00'; const wn = winner === 0 ? 'DRAW' : (winner === P1 ? document.getElementById('name-p1').textContent : document.getElementById('name-p2').textContent) + ' WINS'; if (winner) { scores[winner - 1]++; streaks[winner - 1]++; streaks[(winner === P1 ? P2 : P1) - 1] = 0; document.getElementById(`score-p${winner}`).textContent = scores[winner - 1]; } setTimeout(() => showResult(wn, `Lines: P1=${p1L}  P2=${p2L}`, 'TERRITORY WAR COMPLETE', color), 700); } else { setTimeout(() => showResult('DRAW', 'The lattice is full', `P1: ${scores[0]}  P2: ${scores[1]}`, '#ffee00'), 500); } isDropping = false; refreshColBtns(); return; } currentPlayer = currentPlayer === P1 ? P2 : P1; updateHUD(); buildColUI(); if (camFollow) setTimeout(() => { camPosT.copy(CAM_PRESETS.A.pos); camLookT.copy(CAM_PRESETS.A.target); }, 600); if (vsMode === 'ai' && currentPlayer === P2) { setTimeout(() => { if (!isGameOver && !isDropping) { const col = aiPickColumn(); if (col) dropBall(col[0], col[1]); } }, 500 + TRNG.f() * 400); } else { startTurnTimer(); } }
    function buildScenarioSelect() { const grid = document.getElementById('ss-grid'); grid.innerHTML = ''; SCENARIOS.forEach((sc, i) => { const card = document.createElement('div'); card.className = 'ss-card' + (i === 0 ? ' sel' : ''); card.innerHTML = `<div class="ss-icon">${sc.icon}</div><div class="ss-name">${sc.name}</div><div class="ss-desc">${sc.desc}</div>`; card.onclick = () => { document.querySelectorAll('.ss-card').forEach(c => c.classList.remove('sel')); card.classList.add('sel'); selectedScenario = sc; }; grid.appendChild(card); }); }
    function setVsMode(mode) { vsMode = mode; document.getElementById('pvp-btn').classList.toggle('sel', mode === 'pvp'); document.getElementById('ai-btn').classList.toggle('sel', mode === 'ai'); document.getElementById('diff-row').classList.toggle('show', mode === 'ai'); document.getElementById('name-p2').textContent = mode === 'ai' ? 'AI OPPONENT' : 'PLAYER 2'; }
    function setDiff(d) { aiDiff = d; document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('sel')); document.getElementById(d === 'medium' ? 'diff-med' : `diff-${d}`).classList.add('sel'); }
    function showScenarioSelect() { document.getElementById('result-overlay').classList.remove('show'); document.getElementById('scenario-select').classList.add('show'); }
    function startGame() { currentScenario = selectedScenario; document.getElementById('scenario-select').classList.remove('show'); document.getElementById('scenario-tag').textContent = currentScenario.name; document.querySelectorAll('.panel-mode').forEach(e => e.textContent = currentScenario.name); resetGame(true); }
    function rematch() { document.getElementById('result-overlay').classList.remove('show'); resetGame(false); }
    function resetGame(resetScores) { board.fill(0); currentPlayer = P1; isGameOver = false; isDropping = false; clearTurnTimer(); placedBalls.forEach(b => { scene.remove(b.mesh); scene.remove(b.halo); scene.remove(b.ring); }); placedBalls.length = 0; clearWinGlows(); if (physBall) { scene.remove(physBall.mesh); scene.remove(physBall.halo); physBall = null; } boardGlow.intensity = 0; if (resetScores) { scores = [0, 0]; streaks = [0, 0]; document.getElementById('score-p1').textContent = '0'; document.getElementById('score-p2').textContent = '0'; } moveCounts = [0, 0]; moveLogs = [[], []]; document.getElementById('log-p1').innerHTML = ''; document.getElementById('log-p2').innerHTML = ''; updateHUD(); buildColUI(); if (camFollow) { camPosT.copy(CAM_PRESETS.A.pos); camLookT.copy(CAM_PRESETS.A.target); } boardGlow.color.setHex(0x4422ff); boardGlow.intensity = 5; setTimeout(() => { boardGlow.intensity = 0; }, 500); if (vsMode === 'ai') document.getElementById('name-p2').textContent = 'AI OPPONENT'; startTurnTimer(); }
    let lastT = 0;
    function animate(t) { requestAnimationFrame(animate); const dt = Math.min((t - lastT) / 1000, 0.05); lastT = t; const uTime = t * 0.001; parallax.x += (parallax.tx - parallax.x) * 0.04; parallax.y += (parallax.ty - parallax.y) * 0.04; starLayers.forEach(layer => { layer.material.uniforms.uTime.value = uTime; layer.position.x = parallax.x * layer.userData.parallax; layer.position.y = -parallax.y * layer.userData.parallax * 0.5; }); haloMeshes.forEach((m, i) => { m.rotation.y += m.userData.speed * dt; m.material.opacity = 0.35 + 0.25 * Math.sin(uTime * 1.1 + i * 2.1); }); atmoMat.uniforms.uTime.value = uTime; if (saturn) saturn.rotation.y += 0.003 * dt; if (jupiter) jupiter.rotation.y += 0.008 * dt; if (glbOverlay && !isDropping) glbOverlay.rotation.y = Math.sin(uTime * 0.06) * 0.025; if (!isDropping) latticeGroup.rotation.y = Math.sin(uTime * 0.07) * 0.03; placedBalls.forEach((b, i) => { b.halo.material.opacity = 0.12 + 0.06 * Math.sin(uTime * 1.8 + i * 1.3); b.ring.material.opacity = 0.3 + 0.2 * Math.sin(uTime * 2.2 + i * 0.9); }); physStep(dt); updateParticles(dt); camPos.lerp(camPosT, 0.06); camLookC.lerp(camLookT, 0.07); camera.position.copy(camPos); camera.lookAt(camLookC); renderer.render(scene, camera); }
    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    function setPreloadProgress(p) { document.getElementById('pre-bar').style.width = p + '%'; }
    function finishPreload() { const pre = document.getElementById('preloader'); pre.style.opacity = '0'; setTimeout(() => pre.style.display = 'none', 850); }
    buildScenarioSelect();
    setPreloadProgress(30);

    camPosT.copy(CAM_PRESETS.A.pos);
    setTimeout(() => { setPreloadProgress(100); document.getElementById('pre-msg').textContent = 'READY'; setTimeout(finishPreload, 400); }, GLTF ? 1800 : 400);
    requestAnimationFrame(animate);
    if (typeof ManifoldBridge !== 'undefined') ManifoldBridge.init({ id: '4dtictactoe', version: '2.0.0', x: 4, y: 4, exposes: () => ({ currentPlayer, scores: [...scores], isGameOver, filled: board.filter(v => v).length, scenario: currentScenario.id }) });
