<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manifold Mesh Reducer (ButterflyFX)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: white; font-family: sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
        #ui-panel { position: absolute; top: 20px; left: 20px; width: 350px; background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(10px); border: 1px solid #334; border-radius: 12px; padding: 20px; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .drag-active { border-color: #4CAF50 !important; background: rgba(76, 175, 80, 0.2) !important; }
        .dropzone { border: 2px dashed #556; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 20px; }
        .dropzone:hover { border-color: #889; background: rgba(255,255,255,0.05); }
        
        button { background: #4F46E5; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.2s; }
        button:hover { background: #4338CA; }
        button:disabled { background: #333; cursor: not-allowed; color: #777; }
        
        .slider-container { margin-bottom: 15px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; color: #ccc; }
        input[type="range"] { width: 100%; accent-color: #4F46E5; }
        select { width: 100%; padding: 8px; background: #222; color: white; border: 1px solid #445; border-radius: 4px; margin-bottom: 15px; }
        
        #loading-overlay { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: #4F46E5; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #stats { font-family: monospace; font-size: 12px; color: #aaa; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 6px; margin-top: 15px; }
        .tab-btn { background: transparent; border: 1px solid #4F46E5; color: #4F46E5; }
        .tab-btn.active { background: #4F46E5; color: white; }
        .tab-container { display: flex; gap: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text" class="text-xl font-bold">Processing...</div>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h2 class="text-xl font-bold mb-1 text-white">Manifold Reducer</h2>
        <p class="text-xs text-gray-400 mb-5">ButterflyFX z=x*y Mesh Decimation</p>
        
        <div id="dropzone" class="dropzone">
            <svg class="w-8 h-8 mx-auto mb-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            <div class="text-sm font-medium">Drag & Drop 3D Model</div>
            <div class="text-xs text-gray-500 mt-1">Supports .GLB, .STL</div>
            <input type="file" id="file-input" accept=".glb,.gltf,.stl" style="display: none;">
        </div>
        
        <div class="slider-container">
            <label class="text-sm text-gray-300 mb-1 block">Manifold Type</label>
            <select id="manifold-type">
                <option value="saddle">Hyperbolic Paraboloid (z = x·y)</option>
                <option value="sphere">Spherical Substrate</option>
                <option value="cylinder">Cylindrical Substrate</option>
            </select>
        </div>
        
        <div class="slider-container">
            <div class="slider-label">
                <span>Manifold Resolution (Grid)</span>
                <span id="res-val">64</span>
            </div>
            <input type="range" id="resolution" min="16" max="256" step="8" value="64">
        </div>
        
        <button id="btn-reduce" disabled>Apply Manifold Reduction</button>
        
        <div id="stats" style="display:none;">
            <div>Original Polygons: <span id="stat-orig" class="text-white">0</span></div>
            <div>Reduced Polygons: <span id="stat-red" class="text-green-400">0</span></div>
            <div>Reduction Ratio: <span id="stat-ratio" class="text-blue-400">0%</span></div>
        </div>

        <div class="tab-container mt-4" id="view-tabs" style="display:none;">
            <button class="tab-btn active" data-view="split">Split</button>
            <button class="tab-btn" data-view="original">Original</button>
            <button class="tab-btn" data-view="reduced">Reduced</button>
        </div>
        
        <button id="btn-export" class="mt-4" style="background:#10B981; display:none;">Download .GLB</button>
    </div>

    <!-- Import Map for Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="./manifold-reducer.js"></script>
</body>
</html>
