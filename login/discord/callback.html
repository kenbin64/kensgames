<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Login - Manifold Gaming Portal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a14;
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
        }

        .loading {
            text-align: center;
        }

        .spinner {
            border: 3px solid rgba(88, 101, 242, 0.3);
            border-top: 3px solid #5865f2;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
  <script src="/js/analytics.js"></script>
</head>

<body>
    <div class="loading">
        <div class="spinner"></div>
        <h2>Authenticating with Discord...</h2>
        <p>Redirecting you back to the game portal</p>
    </div>

    <script>
        /**
         * OAuth Discord Callback Handler
         * MVP: simulates a successful login from the real OAuth code.
         * Production: replace the userData block with a real /api/auth/oauth/exchange call.
         */
        (function () {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');
            const error = params.get('error');
            const stored = sessionStorage.getItem('oauth_state_discord');

            function fail(reason) {
                window.location.href = `/?login=failed&provider=discord&reason=${encodeURIComponent(reason)}`;
            }

            if (error) return fail(error);
            if (!code) return fail('missing_code');
            if (stored && stored !== state) return fail('invalid_state');

            const userData = {
                id: `dc_${Math.random().toString(36).substring(2, 9)}`,
                name: `DiscordUser_${Math.floor(Math.random() * 10000)}`,
                displayName: `Champion_${Math.floor(Math.random() * 1000)}`,
                avatar: '🔷',
                provider: 'discord',
                email: `user_${Math.random().toString(36).substring(2, 9)}@discord.local`,
                authenticated: true,
                timestamp: Date.now()
            };

            sessionStorage.setItem('user_session', JSON.stringify(userData));
            sessionStorage.removeItem('oauth_state_discord');

            window.location.href = '/?login=success&provider=discord';
        })();
    </script>
</body>

</html>
