<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KensGames — Game Portal</title>
  <meta http-equiv="refresh" content="0; url=/lobby/">
  <script>
    // Login is handled by Cloudflare Access.
    window.location.replace('/lobby/');
  </script>
  <link rel="icon" href="/assets/images/logo/icon.png" type="image/png">
  <link rel="stylesheet" href="/lib/fonts/fonts.css">
  <link rel="stylesheet" href="/lib/arcade-theme.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      min-height: 0;
      overflow-y: auto;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: rgba(4, 4, 20, .96);
      border: 2px solid var(--nc);
      box-shadow: var(--gc), inset 0 0 40px rgba(0, 255, 255, .04);
      border-radius: 6px;
      padding: 44px 36px;
      animation: fadeUp .4s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .cab-art {
      text-align: center;
      margin-bottom: 28px;
      font-size: 64px;
      line-height: 1;
      filter: drop-shadow(0 0 12px #00FFFF);
    }

    .login-title {
      font-family: var(--fa);
      font-size: 22px;
      font-weight: 900;
      color: var(--nc);
      text-shadow: var(--gc);
      text-transform: uppercase;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 12px;
      color: var(--txm);
      text-align: center;
      margin-bottom: 28px;
      letter-spacing: 1px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--txm);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0, 255, 255, .15);
    }

    .oauth-btn {
      width: 100%;
      padding: 11px;
      margin-bottom: 8px;
      font-family: var(--fa);
      font-size: 10px;
      letter-spacing: 2px;
      background: transparent;
      color: var(--txm);
      border: 1px solid #334466;
      border-radius: 3px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all .2s;
    }

    .oauth-btn:hover {
      border-color: var(--nc);
      color: var(--nc);
    }

    .login-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 12px;
      color: var(--txm);
    }

    .login-footer a {
      color: var(--nc);
      text-decoration: none;
      cursor: pointer;
    }

    .login-footer a:hover {
      text-shadow: var(--gc);
    }

    .insert-coin {
      font-family: var(--fa);
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--np);
      text-shadow: var(--gp);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 20px;
      animation: blink 1.2s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }
  </style>
  <script src="/js/analytics.js"></script>
</head>

<body>
  <div id="tron-grid"></div>
  <div id="scanlines"></div>

  <nav class="arc-nav">
    <div class="arc-nav-inner">
      <a href="/" class="arc-logo"><img src="/assets/images/logo/icon.png" alt="KensGames"
          style="height:22px;width:auto;vertical-align:middle;margin-right:8px;">KEN<span>S</span>GAMES</a>
      <div class="arc-nav-right">
        <a href="/register" class="btn btn-p">JOIN FREE</a>
      </div>
    </div>
  </nav>

  <div class="login-wrap">
    <div class="login-box">
      <div class="cab-art">&#127918;</div>
      <div class="insert-coin">&#9655; INSERT COIN TO CONTINUE &#9655;</div>
      <div class="login-title">Sign In</div>
      <div class="login-sub">Enter your credentials, player</div>

      <form onsubmit="handleLogin(event)">
        <div class="arc-field">
          <label>Username or Email</label>
          <input class="arc-input" type="text" id="l-user" placeholder="player@kensgames.com" required
            autocomplete="username">
        </div>
        <div class="arc-field">
          <label>Password</label>
          <input class="arc-input" type="password" id="l-pass"
            placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-c btn-full" style="margin-top:4px;">&#9654; SIGN IN</button>
        <div class="arc-msg" id="l-msg"></div>
      </form>

      <div class="divider">or</div>
      <button class="oauth-btn" onclick="oauthLogin('google')">&#9654; Continue with Google</button>
      <button class="oauth-btn" onclick="oauthLogin('discord')">&#9654; Continue with Discord</button>

      <div class="login-footer">
        <a href="/forgot-password">Forgot password?</a>
        &nbsp;&nbsp;|&nbsp;&nbsp;
        No account? <a href="/register">Join free</a>
      </div>
    </div>
  </div>

  <script>
    const API = '/api/auth';
    if (localStorage.getItem('user_token')) window.location.href = '/lobby';

    async function handleLogin(e) {
      e.preventDefault();
      const msg = document.getElementById('l-msg');
      msg.textContent = 'Authenticating...'; msg.className = 'arc-msg';
      try {
        const res = await fetch(`${API}/login`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: document.getElementById('l-user').value, password: document.getElementById('l-pass').value })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('user_token', data.token);
          localStorage.setItem('user_id', data.userId);
          localStorage.setItem('username', data.username);
          localStorage.setItem('display_name', data.displayName);
          if (data.avatar) localStorage.setItem('kg_avatar', JSON.stringify({ emoji: data.avatar, name: data.displayName }));
          msg.textContent = 'Welcome back!'; msg.className = 'arc-msg ok';
          const redir = new URLSearchParams(location.search).get('redirect') || '/lobby';
          setTimeout(() => window.location.href = redir, 700);
        } else {
          msg.textContent = data.error || data.message || 'Invalid credentials'; msg.className = 'arc-msg err';
        }
      } catch { msg.textContent = 'Connection error'; msg.className = 'arc-msg err'; }
    }

    function oauthLogin(p) { window.location.href = `${API}/${p}`; }
  </script>
</body>

</html>
