<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - KensGames</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
      padding: 40px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
      font-size: 40px;
    }

    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: #666;
      font-size: 14px;
    }

    .loading.show {
      display: block;
    }

    .link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }

    .link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .link a:hover {
      text-decoration: underline;
    }

    .forgot-password {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 20px;
    }

    .forgot-password a {
      color: #667eea;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="logo">🎮</div>
    <h1>KensGames</h1>
    <p class="subtitle">Login to play with friends</p>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required
          autocomplete="username" />
      </div>

      <div class="form-group">
        <label for="password">Password (optional)</label>
        <input type="password" id="password" name="password" placeholder="Leave blank for no password"
          autocomplete="current-password" />
      </div>

      <div class="button-group">
        <button type="submit" class="btn-primary">Login</button>
        <button type="button" class="btn-secondary" onclick="window.location.href='/register'">
          Create Account
        </button>
      </div>

      <div class="loading" id="loading">
        <span>Logging in...</span>
      </div>
    </form>

    <div class="link">
      Don't have an account? <a href="/register">Sign up here</a>
    </div>
  </div>

  <script>
    // Dynamic API URL - use /api/auth (nginx reverse proxies to localhost:3000)
    const API_URL = '/api/auth';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      // Clear messages
      document.getElementById('errorMessage').classList.remove('show');
      document.getElementById('successMessage').classList.remove('show');

      // Show loading
      document.getElementById('loading').classList.add('show');

      try {
        const response = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: username,
            password: password || undefined
          })
        });

        const data = await response.json();

        if (data.success) {
          // Store token and user info
          localStorage.setItem('user_token', data.token);
          localStorage.setItem('user_id', data.userId);
          localStorage.setItem('username', data.username);
          localStorage.setItem('display_name', data.displayName);
          localStorage.setItem('avatar', data.avatar);

          // Show success message
          document.getElementById('successMessage').textContent = 'Login successful! Redirecting...';
          document.getElementById('successMessage').classList.add('show');

          // Redirect after brief delay
          setTimeout(() => {
            window.location.href = '/lobby';
          }, 1000);
        } else {
          throw new Error(data.error || 'Login failed');
        }
      } catch (error) {
        console.error('Login error:', error);
        document.getElementById('errorMessage').textContent = error.message;
        document.getElementById('errorMessage').classList.add('show');
      } finally {
        document.getElementById('loading').classList.remove('show');
      }
    });

    // Check if already logged in
    window.addEventListener('load', () => {
      if (localStorage.getItem('user_token')) {
        window.location.href = '/lobby';
      }
    });
  </script>
</body>

</html>
