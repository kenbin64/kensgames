<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — KensGames</title>
  <link rel="icon" href="/assets/masterImageFile/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/lib/fonts/fonts.css">
  <link rel="stylesheet" href="/lib/arcade-theme.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: rgba(4, 4, 20, .96);
      border: 2px solid var(--nc);
      box-shadow: var(--gc), inset 0 0 40px rgba(0, 255, 255, .04);
      border-radius: 6px;
      padding: 44px 36px;
      animation: fadeUp .4s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .login-footer {
      text-align: center;
      margin-top: 18px;
      font-size: 12px;
      color: var(--txm);
    }

    .login-footer a {
      color: var(--nc);
      text-decoration: none;
    }

    .login-footer a:hover {
      text-shadow: var(--gc);
    }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 11px;
      color: var(--txm);
      margin-top: 4px;
      margin-bottom: 16px;
      text-decoration: none;
    }

    .forgot-link:hover {
      color: var(--nc);
    }

    .submit-login {
      width: 100%;
      padding: 14px;
      margin-top: 4px;
      font-family: var(--fa);
      font-size: 13px;
      letter-spacing: 2px;
      background: var(--nc);
      color: var(--bg);
      border: none;
      border-radius: 3px;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: 900;
      box-shadow: var(--gc);
      transition: all .25s;
    }

    .submit-login:hover {
      transform: scale(1.03);
      box-shadow: var(--gc), 0 0 30px var(--nc);
    }
  </style>
  <script src="/js/analytics.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body>
  <div id="tron-grid"></div>
  <div id="scanlines"></div>

  <nav class="arc-nav">
    <div class="arc-nav-inner">
      <a href="/" class="arc-logo"><img src="/assets/masterImageFile/icon.svg" alt="KensGames"
          style="height:22px;width:auto;vertical-align:middle;margin-right:8px;">KEN<span>S</span>GAMES</a>
      <div class="arc-nav-right">
        <a href="/register/" class="btn btn-p">JOIN FREE</a>
      </div>
    </div>
  </nav>

  <div class="login-wrap">
    <div class="login-box">
      <form onsubmit="handleLogin(event)">
        <div class="arc-field">
          <label>Playername</label>
          <input class="arc-input" type="text" id="l-user" placeholder="YourPlayername" required
            autocomplete="username">
        </div>
        <div class="arc-field">
          <label>Password</label>
          <input class="arc-input" type="password" id="l-pass" placeholder="••••••••" required
            autocomplete="current-password">
        </div>
        <a href="/forgot-password/" class="forgot-link">Forgot password?</a>
        <div class="cf-turnstile" data-sitekey="0x4AAAAAAC_uN7CPKfVyy0fj" data-theme="dark" style="margin-bottom:4px;">
        </div>
        <button type="submit" class="submit-login">&#9654; SIGN IN</button>
        <div class="arc-msg" id="l-msg"></div>
      </form>

      <div class="login-footer">
        New player? <a href="/register/">Join free</a>
      </div>
    </div>
  </div>

  <script>
    const API = '/api/auth';

    (async function () {
      const redir = new URLSearchParams(location.search).get('redirect') || '/';
      const t = localStorage.getItem('kg_token');
      if (t) {
        try {
          const r = await fetch(`${API}/validate`, { headers: { Authorization: `Bearer ${t}` } });
          if (r.ok) { const d = await r.json(); if (d && d.valid) { window.location.replace(redir); return; } }
          localStorage.removeItem('kg_token');
        } catch { }
      }
    })();

    async function handleLogin(e) {
      e.preventDefault();
      const msg = document.getElementById('l-msg');
      msg.textContent = 'Authenticating...'; msg.className = 'arc-msg';
      try {
        const tsToken = document.querySelector('[name="cf-turnstile-response"]')?.value || '';
        if (!tsToken) { msg.textContent = 'Please complete the security check'; msg.className = 'arc-msg err'; return; }
        const res = await fetch(`${API}/login`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('l-user').value.trim(),
            password: document.getElementById('l-pass').value,
            turnstileToken: tsToken
          })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('kg_token', data.token);
          localStorage.setItem('kg_user_id', data.userId);
          localStorage.setItem('kg_username', data.username);
          localStorage.setItem('kg_display_name', data.displayName);
          if (data.avatar) localStorage.setItem('kg_avatar', JSON.stringify({ emoji: data.avatar, name: data.displayName }));
          const redir = new URLSearchParams(location.search).get('redirect') || '/';
          if (!data.profileSetup) {
            msg.textContent = 'First time? Set up your profile…'; msg.className = 'arc-msg ok';
            setTimeout(() => { window.location.href = '/player/setup.html?redirect=' + encodeURIComponent(redir); }, 700);
          } else {
            msg.textContent = 'Welcome back!'; msg.className = 'arc-msg ok';
            setTimeout(() => { window.location.href = redir; }, 700);
          }
        } else {
          msg.textContent = data.error || data.message || 'Invalid credentials'; msg.className = 'arc-msg err';
        }
      } catch { msg.textContent = 'Connection error'; msg.className = 'arc-msg err'; }
    }
  </script>
</body>

</html>
