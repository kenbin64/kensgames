<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KensGames — Guild</title>
  <link rel="icon" href="/fasttrack/assets/images/icon-192.png" type="image/png">
  <link rel="stylesheet" href="/arcade.css">
  <link rel="stylesheet" href="/css/manifold_3d.css">
  <style>
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
      padding-top: 80px;
      position: relative;
      z-index: 2;
    }

    .guild-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: var(--panel-bg);
      border: 1px solid var(--c2);
      border-radius: 10px;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 20px rgba(191, 0, 255, 0.08);
    }

    .guild-badge {
      font-family: 'Press Start 2P', monospace;
      font-size: 1rem;
      color: var(--c2);
      text-shadow: var(--glow2);
      border: 2px solid var(--c2);
      padding: 0.5rem 1rem;
      border-radius: 4px;
    }

    .guild-info .guild-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .guild-info .guild-meta {
      color: var(--dim);
      font-size: 0.8rem;
    }

    .guild-actions {
      margin-left: auto;
      display: flex;
      gap: 0.5rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 1.5rem;
    }

    @media (max-width: 800px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    /* Members panel */
    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      padding: 1.25rem;
    }

    .panel-head {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.48rem;
      color: var(--c2);
      letter-spacing: 2px;
      margin-bottom: 1rem;
    }

    .member-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .member-row:last-child {
      border-bottom: none;
    }

    .m-avatar {
      font-size: 1.3rem;
    }

    .m-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .m-dot.on {
      background: var(--c3);
      box-shadow: 0 0 4px var(--c3);
    }

    .m-dot.off {
      background: #444;
    }

    .m-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.42rem;
      color: var(--text);
    }

    .m-role {
      font-size: 0.65rem;
      color: var(--dim);
      margin-top: 0.15rem;
    }

    .m-suspended {
      color: #ff8800;
      font-size: 0.65rem;
      margin-top: 0.15rem;
    }

    .m-actions {
      margin-left: auto;
      display: flex;
      gap: 0.3rem;
    }

    .m-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.33rem;
      padding: 0.25rem 0.45rem;
      cursor: pointer;
      border-radius: 3px;
      border: 1px solid;
      background: transparent;
      transition: all 0.15s;
    }

    .m-btn.sus {
      color: #ff8800;
      border-color: #ff8800;
    }

    .m-btn.sus:hover {
      background: #ff8800;
      color: var(--void);
    }

    .m-btn.boot {
      color: #ff4d4d;
      border-color: #ff4d4d;
    }

    .m-btn.boot:hover {
      background: #ff4d4d;
      color: #fff;
    }

    .m-btn.ok {
      color: var(--c3);
      border-color: var(--c3);
    }

    .m-btn.ok:hover {
      background: var(--c3);
      color: var(--void);
    }

    /* Chat */
    .chat-wrap {
      display: flex;
      flex-direction: column;
      height: 420px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .chat-msg {
      font-size: 0.78rem;
    }

    .chat-msg .cm-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.38rem;
      color: var(--c2);
      margin-right: 0.4rem;
    }

    .chat-msg .cm-text {
      color: var(--text);
    }

    .chat-msg .cm-time {
      color: var(--dim);
      font-size: 0.65rem;
    }

    .chat-input-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .chat-input {
      flex: 1;
      padding: 0.55rem 0.8rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
    }

    .chat-input:focus {
      border-color: var(--c2);
    }

    .chat-send {
      padding: 0.55rem 0.9rem;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.38rem;
      background: transparent;
      border: 1px solid var(--c2);
      color: var(--c2);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .chat-send:hover {
      background: var(--c2);
      color: #fff;
    }

    .chat-locked {
      text-align: center;
      padding: 2rem;
      color: var(--dim);
      font-size: 0.78rem;
    }

    /* Guildmaster panel */
    .gm-panel {
      margin-top: 1.5rem;
    }

    .gm-section {
      margin-bottom: 1.5rem;
    }

    .gm-section-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      color: var(--c3);
      letter-spacing: 2px;
      margin-bottom: 0.75rem;
    }

    .request-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem;
      background: rgba(0, 0, 0, 0.15);
      border-radius: 6px;
      margin-bottom: 0.4rem;
      font-size: 0.75rem;
    }

    .request-note {
      color: var(--dim);
      font-size: 0.7rem;
      flex: 1;
    }

    .appeal-row {
      background: rgba(255, 136, 0, 0.08);
      border: 1px solid rgba(255, 136, 0, 0.3);
      border-radius: 6px;
      padding: 0.75rem;
      margin-bottom: 0.6rem;
    }

    .appeal-text {
      font-size: 0.78rem;
      color: var(--text);
      margin: 0.4rem 0;
    }

    .appeal-btns {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    /* Suspend modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-box {
      background: var(--surface);
      border: 1px solid #ff8800;
      border-radius: 10px;
      padding: 2rem;
      max-width: 420px;
      width: 90%;
    }

    .modal-title-sm {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: #ff8800;
      margin-bottom: 1.2rem;
    }

    .field-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      color: var(--dim);
      letter-spacing: 1px;
      margin-bottom: 0.4rem;
    }

    .field-select,
    .field-input-sm {
      width: 100%;
      padding: 0.55rem 0.8rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      margin-bottom: 1rem;
    }

    .field-select option {
      background: var(--surface);
    }

    .modal-btns {
      display: flex;
      gap: 0.6rem;
    }

    .modal-btns button {
      flex: 1;
    }

    .status-msg {
      font-size: 0.75rem;
      margin-top: 0.6rem;
      text-align: center;
      min-height: 1.2em;
    }

    .status-msg.err {
      color: #ff4d4d;
    }

    .status-msg.ok {
      color: var(--c3);
    }
  </style>
  <script src="/js/analytics.js" defer></script>
</head>

<body data-mtheme="cyan">
  <div class="scanlines"></div>
  <canvas id="gyroid-bg"></canvas>

  <header class="arcade-header">
    <a href="/portal.html" style="text-decoration:none">
      <div class="logo glitch" data-text="KEN'S ARCADE">KEN'S ARCADE</div>
    </a>
    <nav style="display:flex;gap:0.5rem;">
      <a href="/portal.html" class="arcade-btn">PORTAL</a>
      <a href="/social/guilds.html" class="arcade-btn">GUILDS</a>
    </nav>
    <div class="header-nav">
      <span class="player-tag" id="player-tag"></span>
      <button class="arcade-btn" id="logout-btn">LOGOUT</button>
    </div>
  </header>

  <main>
    <!-- Guild header -->
    <div class="guild-header" id="guild-header">
      <div class="guild-badge" id="guild-tag-badge">…</div>
      <div class="guild-info">
        <div class="guild-name" id="guild-name">Loading…</div>
        <div class="guild-meta" id="guild-meta"></div>
      </div>
      <div class="guild-actions" id="guild-actions"></div>
    </div>

    <div class="layout">
      <!-- LEFT: members + gm panel -->
      <div>
        <div class="panel">
          <div class="panel-head">MEMBERS</div>
          <div id="member-list">
            <div style="color:var(--dim);font-size:0.8rem">Loading…</div>
          </div>
        </div>

        <!-- Guildmaster panel (only shown to GM) -->
        <div class="panel gm-panel" id="gm-panel" style="display:none">
          <!-- Join requests -->
          <div class="gm-section">
            <div class="gm-section-title">JOIN REQUESTS</div>
            <div id="join-requests">
              <div style="color:var(--dim);font-size:0.78rem">No pending requests</div>
            </div>
          </div>
          <!-- Appeals -->
          <div class="gm-section">
            <div class="gm-section-title">SUSPENSION APPEALS</div>
            <div id="appeals-list">
              <div style="color:var(--dim);font-size:0.78rem">No pending appeals</div>
            </div>
          </div>
        </div>

        <!-- My suspension appeal box (shown to suspended member) -->
        <div class="panel" id="appeal-box" style="display:none;margin-top:1.5rem;">
          <div class="panel-head" style="color:#ff8800">YOU ARE SUSPENDED</div>
          <div id="suspension-info" style="font-size:0.8rem;color:var(--dim);margin-bottom:1rem;"></div>
          <div id="appeal-form">
            <div class="field-label" style="margin-bottom:0.4rem;">WRITE YOUR APPEAL</div>
            <textarea id="appeal-text"
              style="width:100%;padding:0.6rem;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:var(--text);font-size:0.85rem;resize:vertical;min-height:80px;outline:none;margin-bottom:0.75rem;"></textarea>
            <button class="arcade-btn" onclick="submitAppeal()">SUBMIT APPEAL</button>
            <div class="status-msg" id="appeal-status"></div>
          </div>
          <div id="appeal-pending" style="display:none;font-size:0.8rem;color:#ff8800">Appeal submitted — awaiting
            guildmaster decision.</div>
        </div>
      </div>

      <!-- RIGHT: chat -->
      <div class="panel">
        <div class="panel-head">GUILD CHAT</div>
        <div class="chat-wrap">
          <div class="chat-messages" id="chat-messages">
            <div class="chat-locked">Chat is for guild members only</div>
          </div>
          <div class="chat-input-row" id="chat-input-row" style="display:none">
            <input class="chat-input" type="text" id="chat-input" placeholder="Message your guild…" maxlength="500"
              onkeydown="if(event.key==='Enter')sendChat()">
            <button class="chat-send" onclick="sendChat()">SEND</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- SUSPEND MODAL -->
  <div class="modal-overlay" id="sus-modal" style="display:none">
    <div class="modal-box">
      <div class="modal-title-sm">SUSPEND MEMBER</div>
      <div style="font-size:0.8rem;color:var(--dim);margin-bottom:1rem">Member: <strong id="sus-target-name"
          style="color:var(--c1)"></strong></div>
      <div class="field-label">DURATION</div>
      <select class="field-select" id="sus-duration">
        <option value="24h">24 Hours</option>
        <option value="7d">1 Week</option>
        <option value="30d">1 Month</option>
        <option value="permanent">Permanent</option>
      </select>
      <div class="field-label">REASON</div>
      <textarea class="field-input-sm" id="sus-reason" placeholder="Reason for suspension…" maxlength="500"
        style="resize:vertical;min-height:70px;"></textarea>
      <div class="modal-btns">
        <button class="arcade-btn" onclick="closeSusModal()">CANCEL</button>
        <button class="arcade-btn" onclick="confirmSuspend()"
          style="border-color:#ff8800;color:#ff8800;">SUSPEND</button>
      </div>
      <div class="status-msg" id="sus-status"></div>
    </div>
  </div>

  <script src="/js/manifold_reality.js" defer></script>
  <script src="/js/manifold_panels.js" defer></script>
  <script>
    'use strict';

    const API = '/api';
    const params = new URLSearchParams(window.location.search);
    const guildId = params.get('id');

    let token = localStorage.getItem('kg_token');
    let myProfile = null;
    let guildData = null;
    let isGM = false;
    let isMember = false;
    let mySuspension = null;

    let pendingSusTarget = null;

    function ah() { return { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' }; }

    async function init() {
      if (!token || !guildId) { window.location.href = '/social/guilds.html'; return; }
      const vr = await fetch(`${API}/auth/validate`, { headers: ah() });
      if (!vr.ok) { localStorage.removeItem('kg_token'); window.location.href = '/login/index.html'; return; }
      const pr = await fetch(`${API}/players/me`, { headers: ah() });
      if (pr.ok) {
        myProfile = await pr.json();
        if (!myProfile.tosAgreed || !myProfile.profileSetup) { window.location.href = '/player/setup.html'; return; }
        document.getElementById('player-tag').textContent = myProfile.playername || myProfile.username;
      }
      loadGuild();
    }

    async function loadGuild() {
      const r = await fetch(`${API}/guilds/${guildId}`, { headers: ah() });
      if (!r.ok) { window.location.href = '/social/guilds.html'; return; }
      const d = await r.json();
      guildData = d.guild;
      isGM = guildData.masterId === myProfile?.userId;
      isMember = guildData.isMember;

      renderHeader();
      renderMembers();
      if (isGM) renderGMPanel();
      if (isMember) loadChat();

      // Check my suspension
      if (isMember && !isGM) {
        const me = guildData.members.find(m => m.userId === myProfile?.userId);
        if (me?.suspended) {
          mySuspension = me;
          showSuspensionBox(me);
        }
      }
    }

    function renderHeader() {
      document.getElementById('guild-tag-badge').textContent = `[${guildData.tag}]`;
      document.getElementById('guild-name').textContent = guildData.name;
      document.getElementById('guild-meta').textContent = `${guildData.members.length} members · Founded ${new Date(guildData.createdAt).toLocaleDateString()}`;
      document.title = `KensGames — ${guildData.name}`;

      const actions = document.getElementById('guild-actions');
      if (isMember && !isGM) {
        actions.innerHTML = `<button class="arcade-btn" onclick="leaveGuild()">LEAVE GUILD</button>`;
      }
    }

    function renderMembers() {
      const list = document.getElementById('member-list');
      if (!guildData.members.length) { list.innerHTML = '<div style="color:var(--dim);font-size:0.8rem">No members</div>'; return; }
      list.innerHTML = guildData.members.map(m => {
        const emoji = '🎮';
        const roleCls = m.role === 'guildmaster' ? 'color:var(--c2)' : '';
        const susTxt = m.suspended ? `<div class="m-suspended">⚠ Suspended${m.suspendedUntil && m.suspendedUntil !== Infinity ? ' until ' + new Date(m.suspendedUntil).toLocaleDateString() : ' (permanent)'}</div>` : '';
        const gmButtons = (isGM && m.userId !== myProfile?.userId && m.role !== 'guildmaster') ? `
          <div class="m-actions">
            ${m.suspended ? `<button class="m-btn ok" onclick="reinstate(${m.userId})">REINSTATE</button>` : `<button class="m-btn sus" onclick="openSuspend(${m.userId},'${escHtml(m.playername)}')">SUSPEND</button>`}
            <button class="m-btn boot" onclick="bootMember(${m.userId})">BOOT</button>
          </div>` : '';
        return `<div class="member-row">
          <div class="m-avatar">${emoji}</div>
          <div class="m-dot ${m.online ? 'on' : 'off'}"></div>
          <div style="flex:1">
            <div class="m-name" style="${roleCls}">${escHtml(m.playername)}</div>
            <div class="m-role">${m.role}${m.userId === myProfile?.userId ? ' (you)' : ''}</div>
            ${susTxt}
          </div>
          ${gmButtons}
        </div>`;
      }).join('');
    }

    function renderGMPanel() {
      document.getElementById('gm-panel').style.display = 'block';

      // Join requests
      const reqs = guildData.requests || [];
      const reqEl = document.getElementById('join-requests');
      if (!reqs.length) { reqEl.innerHTML = '<div style="color:var(--dim);font-size:0.78rem">No pending requests</div>'; }
      else reqEl.innerHTML = reqs.map(r => `
        <div class="request-row">
          <span style="font-family:\'Press Start 2P\',monospace;font-size:0.4rem;color:var(--text)">${escHtml(r.playername || '?')}</span>
          <span class="request-note">"${escHtml(r.note || 'No note')}"</span>
          <button class="m-btn ok" onclick="acceptRequest(${r.userId},true)">ACCEPT</button>
          <button class="m-btn boot" onclick="acceptRequest(${r.userId},false)">DENY</button>
        </div>`).join('');

      // Appeals
      const appeals = guildData.appeals || [];
      const appEl = document.getElementById('appeals-list');
      if (!appeals.length) { appEl.innerHTML = '<div style="color:var(--dim);font-size:0.78rem">No pending appeals</div>'; }
      else appEl.innerHTML = appeals.map(a => `
        <div class="appeal-row">
          <div style="font-family:\'Press Start 2P\',monospace;font-size:0.4rem;color:#ff8800">APPEAL from userId ${a.userId}</div>
          <div class="appeal-text">"${escHtml(a.text)}"</div>
          <div style="font-size:0.65rem;color:var(--dim)">${new Date(a.createdAt).toLocaleString()}</div>
          <div class="appeal-btns">
            <button class="m-btn ok" onclick="decideAppeal('${a.appealId}',true)">APPROVE</button>
            <button class="m-btn boot" onclick="decideAppeal('${a.appealId}',false)">DENY</button>
          </div>
        </div>`).join('');
    }

    function showSuspensionBox(member) {
      document.getElementById('appeal-box').style.display = 'block';
      const until = member.suspendedUntil === Infinity ? 'Permanently' : new Date(member.suspendedUntil).toLocaleString();
      document.getElementById('suspension-info').textContent = `You are suspended. Duration: ${member.duration || '?'} · Until: ${until}`;
    }

    async function loadChat() {
      const r = await fetch(`${API}/chat/${guildId}/history`, { headers: ah() });
      if (!r.ok) return;
      const d = await r.json();
      renderChat(d.messages || []);
      if (!mySuspension) {
        document.getElementById('chat-input-row').style.display = 'flex';
      }
    }

    function renderChat(msgs) {
      const el = document.getElementById('chat-messages');
      if (!msgs.length) { el.innerHTML = '<div style="color:var(--dim);font-size:0.78rem;padding:1rem">No messages yet</div>'; return; }
      el.innerHTML = msgs.map(m => `
        <div class="chat-msg">
          <span class="cm-name">${escHtml(m.playername)}</span>
          <span class="cm-text">${escHtml(m.text)}</span>
          <span class="cm-time"> · ${new Date(m.sentAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
        </div>`).join('');
      el.scrollTop = el.scrollHeight;
    }

    async function sendChat() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      const r = await fetch(`${API}/chat/${guildId}/send`, { method: 'POST', headers: ah(), body: JSON.stringify({ text }) });
      if (r.ok) loadChat();
    }

    function openSuspend(userId, name) {
      pendingSusTarget = userId;
      document.getElementById('sus-target-name').textContent = name;
      document.getElementById('sus-duration').value = '24h';
      document.getElementById('sus-reason').value = '';
      document.getElementById('sus-status').textContent = '';
      document.getElementById('sus-modal').style.display = 'flex';
    }
    function closeSusModal() { document.getElementById('sus-modal').style.display = 'none'; pendingSusTarget = null; }

    async function confirmSuspend() {
      const duration = document.getElementById('sus-duration').value;
      const reason = document.getElementById('sus-reason').value.trim();
      const st = document.getElementById('sus-status');
      const r = await fetch(`${API}/guilds/${guildId}/suspend`, {
        method: 'POST', headers: ah(),
        body: JSON.stringify({ userId: pendingSusTarget, duration, reason }),
      });
      const d = await r.json();
      if (d.success) { st.className = 'status-msg ok'; st.textContent = 'Suspended'; setTimeout(() => { closeSusModal(); loadGuild(); }, 800); }
      else { st.className = 'status-msg err'; st.textContent = d.error || 'Failed'; }
    }

    async function reinstate(userId) {
      await fetch(`${API}/guilds/${guildId}/reinstate`, { method: 'POST', headers: ah(), body: JSON.stringify({ userId }) });
      loadGuild();
    }

    async function bootMember(userId) {
      if (!confirm('Remove this member from the guild?')) return;
      await fetch(`${API}/guilds/${guildId}/boot`, { method: 'POST', headers: ah(), body: JSON.stringify({ userId }) });
      loadGuild();
    }

    async function acceptRequest(userId, accept) {
      await fetch(`${API}/guilds/${guildId}/accept`, { method: 'POST', headers: ah(), body: JSON.stringify({ userId, accept }) });
      loadGuild();
    }

    async function decideAppeal(appealId, approve) {
      await fetch(`${API}/guilds/${guildId}/appeal/${appealId}/decide`, { method: 'POST', headers: ah(), body: JSON.stringify({ approve }) });
      loadGuild();
    }

    async function submitAppeal() {
      const text = document.getElementById('appeal-text').value.trim();
      const st = document.getElementById('appeal-status');
      if (text.length < 10) { st.className = 'status-msg err'; st.textContent = 'Appeal must be at least 10 characters'; return; }
      const r = await fetch(`${API}/guilds/${guildId}/appeal`, { method: 'POST', headers: ah(), body: JSON.stringify({ text }) });
      const d = await r.json();
      if (d.success) {
        st.className = 'status-msg ok'; st.textContent = 'Appeal submitted';
        document.getElementById('appeal-form').style.display = 'none';
        document.getElementById('appeal-pending').style.display = 'block';
      } else { st.className = 'status-msg err'; st.textContent = d.error || 'Failed'; }
    }

    async function leaveGuild() {
      if (!confirm('Leave this guild?')) return;
      await fetch(`${API}/guilds/${guildId}/leave`, { method: 'POST', headers: ah() });
      window.location.href = '/social/guilds.html';
    }

    function escHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

    document.getElementById('logout-btn').addEventListener('click', () => { localStorage.removeItem('kg_token'); window.location.href = '/'; });

    init();
  </script>
</body>

</html>
