<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Free — KensGames</title>
  <link rel="icon" href="/assets/masterImageFile/icon.png" type="image/png">
  <link rel="stylesheet" href="/lib/fonts/fonts.css">
  <link rel="stylesheet" href="/lib/arcade-theme.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .reg-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .reg-box {
      width: 100%;
      max-width: 480px;
      background: rgba(4, 4, 20, .96);
      border: 2px solid var(--np);
      box-shadow: var(--gp), inset 0 0 40px rgba(255, 0, 255, .03);
      border-radius: 6px;
      padding: 44px 36px;
      animation: fadeUp .4s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .cab-art {
      text-align: center;
      margin-bottom: 20px;
      font-size: 60px;
      filter: drop-shadow(0 0 12px #FF00FF);
    }

    .reg-title {
      font-family: var(--fa);
      font-size: 22px;
      font-weight: 900;
      color: var(--np);
      text-shadow: var(--gp);
      text-transform: uppercase;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 4px;
    }

    .reg-sub {
      font-size: 12px;
      color: var(--txm);
      text-align: center;
      margin-bottom: 28px;
      letter-spacing: 1px;
    }

    .perks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }

    .perk {
      font-family: var(--fa);
      font-size: 9px;
      letter-spacing: 1px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 0, 255, .2);
      border-radius: 3px;
      color: var(--txm);
      text-transform: uppercase;
    }

    .perk span {
      color: var(--np);
      margin-right: 5px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .reg-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--txm);
    }

    .reg-footer a {
      color: var(--np);
      text-decoration: none;
    }

    .reg-footer a:hover {
      text-shadow: var(--gp);
    }

    .submit-reg {
      width: 100%;
      padding: 14px;
      margin-top: 4px;
      font-family: var(--fa);
      font-size: 13px;
      letter-spacing: 2px;
      background: var(--np);
      color: var(--bg);
      border: none;
      border-radius: 3px;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: 900;
      box-shadow: var(--gp);
      transition: all .25s;
    }

    .submit-reg:hover {
      transform: scale(1.03);
      box-shadow: var(--gp), 0 0 30px var(--np);
    }
  </style>
  <script src="/js/analytics.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body>
  <div id="tron-grid"></div>
  <div id="scanlines"></div>

  <nav class="arc-nav">
    <div class="arc-nav-inner">
      <a href="/" class="arc-logo"><img src="/assets/masterImageFile/icon.png" alt="KensGames"
          style="height:22px;width:auto;vertical-align:middle;margin-right:8px;">KEN<span>S</span>GAMES</a>
      <div class="arc-nav-right">
        <a href="/login" class="btn btn-c">SIGN IN</a>
      </div>
    </div>
  </nav>

  <div class="reg-wrap">
    <div class="reg-box">
      <div class="cab-art">&#128481;</div>
      <div class="reg-title">Join Free</div>
      <div class="reg-sub">Zero cost &mdash; forever. No credit card.</div>

      <div class="perks">
        <div class="perk"><span>&#9679;</span>Global Leaderboard</div>
        <div class="perk"><span>&#9679;</span>Cross-game Stats</div>
        <div class="perk"><span>&#9679;</span>Custom Avatar</div>
        <div class="perk"><span>&#9679;</span>Private Games</div>
      </div>

      <form onsubmit="handleRegister(event)">
        <div class="form-row">
          <div class="arc-field">
            <label>Username</label>
            <input class="arc-input" type="text" id="r-user" placeholder="ArcadeHero99" required minlength="3"
              maxlength="20">
          </div>
          <div class="arc-field">
            <label>Display Name</label>
            <input class="arc-input" type="text" id="r-display" placeholder="Hero" maxlength="30">
          </div>
        </div>
        <div class="arc-field">
          <label>Email</label>
          <input class="arc-input" type="email" id="r-email" placeholder="you@email.com" required>
        </div>
        <div class="arc-field">
          <label>Password</label>
          <input class="arc-input" type="password" id="r-pass" placeholder="Min 8 characters" required minlength="8">
        </div>
        <div class="arc-field">
          <label>Confirm Password</label>
          <input class="arc-input" type="password" id="r-pass2" placeholder="Repeat password" required minlength="8">
        </div>
        <div class="cf-turnstile" data-sitekey="0x4AAAAAAC_uN7CPKfVyy0fj" data-theme="dark"
          style="margin-top:12px;margin-bottom:4px;"></div>
        <button type="submit" class="submit-reg">&#9654; CREATE ACCOUNT</button>
        <div class="arc-msg" id="r-msg"></div>
      </form>

      <div class="reg-footer">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    if (localStorage.getItem('user_token')) window.location.href = '/lobby';

    async function handleRegister(e) {
      e.preventDefault();
      const msg = document.getElementById('r-msg');
      const pass = document.getElementById('r-pass').value;
      if (pass !== document.getElementById('r-pass2').value) {
        msg.textContent = 'Passwords do not match'; msg.className = 'arc-msg err'; return;
      }
      const tsToken = document.querySelector('[name="cf-turnstile-response"]')?.value || '';
      if (!tsToken) {
        msg.textContent = 'Please complete the security check'; msg.className = 'arc-msg err'; return;
      }
      msg.textContent = 'Creating account...'; msg.className = 'arc-msg';
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('r-user').value,
            displayName: document.getElementById('r-display').value || document.getElementById('r-user').value,
            email: document.getElementById('r-email').value,
            password: pass,
            turnstileToken: tsToken
          })
        });
        const data = await res.json();
        if (res.ok) {
          msg.textContent = 'Account created! Check your email to verify, then sign in.';
          msg.className = 'arc-msg ok';
          setTimeout(() => window.location.href = '/login', 2500);
        } else {
          msg.textContent = data.message || 'Registration failed'; msg.className = 'arc-msg err';
        }
      } catch { msg.textContent = 'Connection error'; msg.className = 'arc-msg err'; }
    }
  </script>
</body>

</html>
