<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - KensGames</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .register-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 650px;
      padding: 40px;
      animation: slideIn 0.3s ease;
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
      font-size: 40px;
    }

    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
    }

    .feedback {
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    .feedback.show {
      display: block;
    }

    .feedback.valid {
      color: #3c3;
    }

    .feedback.invalid {
      color: #c33;
    }

    /* Avatar Picker with Tabs */
    .avatar-section {
      margin-bottom: 20px;
    }

    .avatar-label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .avatar-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
      overflow-x: auto;
      padding-bottom: 8px;
      border-bottom: 2px solid #e0e0e0;
    }

    .avatar-tab-btn {
      padding: 10px 16px;
      border: none;
      background: #f0f0f0;
      color: #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      transition: all 0.3s;
      border: 2px solid transparent;
    }

    .avatar-tab-btn:hover {
      background: #e0e0e0;
    }

    .avatar-tab-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 20px;
      max-height: 400px;
      overflow-y: auto;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 8px;
    }

    .avatar-option {
      padding: 8px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      text-align: center;
      aspect-ratio: 1;
      overflow: hidden;
    }

    .avatar-option img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-option:hover {
      border-color: #667eea;
      transform: scale(1.05);
    }

    .avatar-option.selected {
      border-color: #667eea;
      box-shadow: 0 0 10px rgba(102, 126, 234, 0.5), inset 0 0 0 3px #667eea;
    }

    /* Password Strength Meter */
    .password-strength {
      margin-top: 8px;
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
    }

    .strength-bar {
      height: 100%;
      width: 0%;
      transition: all 0.3s;
      border-radius: 2px;
    }

    .strength-bar.weak {
      width: 33%;
      background: #c33;
    }

    .strength-bar.medium {
      width: 66%;
      background: #ff9800;
    }

    .strength-bar.strong {
      width: 100%;
      background: #3c3;
    }

    .strength-text {
      font-size: 11px;
      margin-top: 4px;
      color: #666;
    }

    /* Requirements Checklist */
    .requirements {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 20px;
    }

    .requirement-item {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }

    .requirement-item:last-child {
      margin-bottom: 0;
    }

    .requirement-check {
      margin-right: 8px;
      font-weight: bold;
      color: #999;
    }

    .requirement-check.met {
      color: #3c3;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .login-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      color: #666;
    }

    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: bold;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #999;
    }
  </style>
</head>

<body>
  <div class="register-container">
    <div class="logo">🎮</div>
    <h1>Create Your Account</h1>
    <p class="subtitle">Join the KensGames community</p>

    <form id="registerForm">
      <!-- Username -->
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="3-24 characters, no spaces" required>
        <div id="usernameFeedback" class="feedback"></div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required>
        <div id="emailFeedback" class="feedback"></div>
      </div>

      <!-- Avatar Picker with Tabs -->
      <div class="avatar-section">
        <label class="avatar-label">Choose Your Avatar</label>
        <div class="avatar-tabs" id="avatarTabs"></div>
        <div class="avatar-grid" id="avatarGrid"></div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required>
        <div class="password-strength">
          <div class="strength-bar" id="strengthBar"></div>
        </div>
        <div class="strength-text" id="strengthText"></div>
        <div class="requirements">
          <div class="requirement-item">
            <span class="requirement-check" id="check-length">○</span>
            <span>At least 8 characters</span>
          </div>
          <div class="requirement-item">
            <span class="requirement-check" id="check-upper">○</span>
            <span>At least 1 uppercase letter</span>
          </div>
          <div class="requirement-item">
            <span class="requirement-check" id="check-special">○</span>
            <span>At least 1 special character (!%$#&)</span>
          </div>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
        <div id="confirmFeedback" class="feedback"></div>
      </div>

      <button type="submit" id="registerBtn">Create Account</button>
      <div class="login-link">
        Already have an account? <a href="/login">Login here</a>
      </div>
    </form>
  </div>

    let selectedAvatar = 'person_pale_1';
    let currentCategory = 'people';

    // Initialize avatar picker
    function initAvatarPicker() {
      const tabsContainer = document.getElementById('avatarTabs');

      Object.entries(AVATAR_CATALOG).forEach(([categoryId, category], index) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `avatar-tab-btn ${index === 0 ? 'active' : ''}`;
        btn.textContent = category.name;
        btn.onclick = (e) => {
          e.preventDefault();
          selectCategory(categoryId);
        };
        tabsContainer.appendChild(btn);
      });

      // Show first category
      selectCategory('people');
    }

    function selectCategory(categoryId) {
      currentCategory = categoryId;

      // Update active tab
      document.querySelectorAll('.avatar-tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');

      // Update grid
      const category = AVATAR_CATALOG[categoryId];
      const grid = document.getElementById('avatarGrid');

      if (category.useDiceBear) {
        grid.innerHTML = '<div class="loading">Loading diverse avatars...</div>';

        // Generate DiceBear avatars
        grid.innerHTML = category.avatars.map(avatar => `
          <div class="avatar-option ${avatar.id === selectedAvatar ? 'selected' : ''}"
               onclick="selectAvatar('${avatar.id}')"
               title="${avatar.description}">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(avatar.seed)}&scale=80"
                 alt="${avatar.description}"
                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23ccc%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E'">
          </div>
        `).join('');
      } else {
        grid.innerHTML = category.avatars.map(avatar => `
          <div class="avatar-option ${avatar.id === selectedAvatar ? 'selected' : ''}"
               onclick="selectAvatar('${avatar.id}')"
               title="${avatar.name}">
            ${avatar.emoji}
          </div>
        `).join('');
      }
    }

    function selectAvatar(avatarId) {
      selectedAvatar = avatarId;
      document.querySelectorAll('.avatar-option').forEach(opt => {
        opt.classList.remove('selected');
      });
      event.target.closest('.avatar-option').classList.add('selected');
    }

    // Form validation
    function validateUsername(username) {
      const regex = /^[a-zA-Z0-9_-]{3,24}$/;
      if (!username) return { valid: false, message: 'Username required' };
      if (!regex.test(username)) return { valid: false, message: 'Username must be 3-24 chars, alphanumeric + underscore/dash' };
      return { valid: true, message: '✓ Username available' };
    }

    function validateEmail(email, username) {
      const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email) return { valid: false, message: 'Email required' };
      if (!regex.test(email)) return { valid: false, message: 'Invalid email format' };
      if (email.toLowerCase().includes(username.toLowerCase())) {
        return { valid: false, message: 'Email cannot contain username' };
      }
      return { valid: true, message: '✓ Email valid' };
    }

    function validatePassword(password) {
      const checks = {
        length: password.length >= 8,
        uppercase: /[A-Z]/.test(password),
        special: /[!%$#&]/.test(password)
      };

      document.getElementById('check-length').textContent = checks.length ? '✓' : '○';
      document.getElementById('check-length').classList.toggle('met', checks.length);

      document.getElementById('check-upper').textContent = checks.uppercase ? '✓' : '○';
      document.getElementById('check-upper').classList.toggle('met', checks.uppercase);

      document.getElementById('check-special').textContent = checks.special ? '✓' : '○';
      document.getElementById('check-special').classList.toggle('met', checks.special);

      const metCount = Object.values(checks).filter(v => v).length;
      const strengthBar = document.getElementById('strengthBar');
      const strengthText = document.getElementById('strengthText');

      if (metCount === 0) {
        strengthBar.className = 'strength-bar';
        strengthText.textContent = '';
      } else if (metCount === 1) {
        strengthBar.className = 'strength-bar weak';
        strengthText.textContent = 'Weak';
      } else if (metCount === 2) {
        strengthBar.className = 'strength-bar medium';
        strengthText.textContent = 'Medium';
      } else {
        strengthBar.className = 'strength-bar strong';
        strengthText.textContent = 'Strong';
      }

      return Object.values(checks).every(v => v);
    }

    // Event listeners
    document.getElementById('username').addEventListener('input', function() {
      const result = validateUsername(this.value);
      const feedback = document.getElementById('usernameFeedback');
      feedback.textContent = result.message;
      feedback.classList.toggle('show', this.value.length > 0);
      feedback.classList.toggle('valid', result.valid);
      feedback.classList.toggle('invalid', !result.valid && this.value.length > 0);
    });

    document.getElementById('email').addEventListener('input', function() {
      const username = document.getElementById('username').value;
      const result = validateEmail(this.value, username);
      const feedback = document.getElementById('emailFeedback');
      feedback.textContent = result.message;
      feedback.classList.toggle('show', this.value.length > 0);
      feedback.classList.toggle('valid', result.valid);
      feedback.classList.toggle('invalid', !result.valid && this.value.length > 0);
    });

    document.getElementById('password').addEventListener('input', function() {
      validatePassword(this.value);
    });

    document.getElementById('confirmPassword').addEventListener('input', function() {
      const password = document.getElementById('password').value;
      const feedback = document.getElementById('confirmFeedback');

      if (this.value && password !== this.value) {
        feedback.textContent = 'Passwords do not match';
        feedback.classList.add('show', 'invalid');
        feedback.classList.remove('valid');
      } else if (this.value && password === this.value) {
        feedback.textContent = '✓ Passwords match';
        feedback.classList.add('show', 'valid');
        feedback.classList.remove('invalid');
      } else {
        feedback.classList.remove('show');
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Final validation
      if (!validateUsername(username).valid) {
        alert('Invalid username');
        return;
      }
      if (!validateEmail(email, username).valid) {
        alert('Invalid email');
        return;
      }
      if (!validatePassword(password)) {
        alert('Password does not meet requirements');
        return;
      }
      if (password !== confirmPassword) {
        alert('Passwords do not match');
        return;
      }

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username,
            email,
            password,
            avatar: selectedAvatar
          })
        });

        const data = await response.json();

        if (data.success) {
          alert('Account created! Redirecting to login...');
          window.location.href = '/login';
        } else {
          alert('Registration failed: ' + data.error);
        }
      } catch (error) {
        console.error('Registration error:', error);
        alert('Registration failed. Please try again.');
      }
    });

    // Initialize on page load
    window.addEventListener('DOMContentLoaded', initAvatarPicker);
  </script>
</body>

</html>
