<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrickBreaker 3D Lobby &mdash; KensGames</title>
  <link rel="icon" href="/assets/images/logo/icon.png" type="image/png">
  <link rel="stylesheet" href="/lib/fonts/fonts.css">
  <link rel="stylesheet" href="/lib/arcade-theme.css">
  <style>
    :root {
      /* Canonical KensGames Tron palette: cyan primary, green go, purple accent. */
      --accent: #00FFFF;
      --gaccent: 0 0 8px #00FFFF, 0 0 24px #00FFFF;
      --accent2: #9900FF;
      --gaccent2: 0 0 8px #9900FF, 0 0 24px #9900FF;
      --surface: rgba(1, 2, 14, 0.84);
      --surface-border: rgba(0, 180, 255, 0.16);
    }

    /* Gyroid live background — same renderer the portal uses. */
    #gyroid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      opacity: 0.22;
      pointer-events: none;
      /* Prevent the canvas from contributing intrinsic size to the flex layout */
      flex-shrink: 0;
      flex-basis: 0;
      max-height: 0;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      background: radial-gradient(ellipse at 50% 0%, rgba(0, 180, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(187, 0, 255, 0.08) 0%, transparent 60%),
        #000008;
    }

    .lobby-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 16px 22px;
      gap: 12px;
      position: relative;
      z-index: 4;
    }

    .cabinet {
      width: 220px;
      margin: 0 auto 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp .5s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .cab-top {
      width: 160px;
      height: 14px;
      background: var(--accent);
      box-shadow: var(--gaccent);
      border-radius: 4px 4px 0 0;
    }

    .cab-body {
      width: 180px;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      box-shadow: inset 0 0 30px rgba(0, 180, 255, .06);
      border-radius: 0 0 8px 8px;
      padding: 20px 16px;
      text-align: center;
    }

    .cab-screen {
      width: 100%;
      height: 90px;
      background: #02040c;
      border: 2px solid rgba(0, 255, 255, .4);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 12px;
      box-shadow: inset 0 0 20px rgba(0, 255, 255, .15);
      color: var(--accent2);
      text-shadow: var(--gaccent2);
    }

    .cab-label {
      font-family: var(--fa);
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--accent);
      text-shadow: var(--gaccent);
      text-transform: uppercase;
    }

    .cab-buttons {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 10px;
    }

    .cab-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--ny);
      box-shadow: 0 0 6px var(--ny);
    }

    .cab-btn:nth-child(2) {
      background: var(--ng);
      box-shadow: 0 0 6px var(--ng);
    }

    .cab-btn:nth-child(3) {
      background: var(--nc);
      box-shadow: 0 0 6px var(--nc);
    }

    .player-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 4px;
      padding: 12px 18px;
      margin-bottom: 28px;
      width: 100%;
      max-width: 520px;
    }

    .player-name {
      font-family: var(--fa);
      font-size: 13px;
      color: var(--accent);
      text-shadow: var(--gaccent);
    }

    .player-meta {
      font-size: 11px;
      color: var(--txm);
    }

    /* Mobile: hide the cabinet art and lift small text into a readable range. */
    @media (max-width: 640px) {
      .cabinet {
        display: none;
      }

      .lobby-wrap {
        padding: 10px 10px 16px;
        gap: 10px;
      }

      .player-card {
        padding: 10px 14px;
        gap: 12px;
      }

      .player-name {
        font-size: 15px;
      }

      .player-meta {
        font-size: 12px;
      }
    }
  </style>
  <script src="/js/analytics.js"></script>
</head>

<body>
  <div id="tron-grid"></div>
  <div id="scanlines"></div>
  <nav class="arc-nav">
    <div class="arc-nav-inner">
      <a href="/" class="arc-logo"><img src="/assets/images/logo/icon.png" alt="KensGames"
          style="height:22px;width:auto;vertical-align:middle;margin-right:8px;">KEN<span>S</span>GAMES</a>
      <ul class="arc-nav-links">
        <li><a href="/">&#8592; Portal</a></li>
        <li><a href="/fasttrack/lobby-simple.html">FastTrack</a></li>
        <li><a href="/starfighter/lobby.html?v=20260501">Alien Attack</a></li>
        <li><a href="/4DTicTacToe/">4D TicTacToe</a></li>
      </ul>
      <div class="arc-nav-right" id="nav-avatar"></div>
    </div>
  </nav>
  <div class="lobby-wrap">
    <div class="cabinet">
      <div class="cab-top"></div>
      <div class="cab-body">
        <div class="cab-screen">&#9632;&#9632;&#9632;&#9632;&#9632;&#9632;&#9632;<br>&#9679;&#8594;</div>
        <div class="cab-label">BrickBreaker 3D</div>
        <div class="cab-buttons">
          <div class="cab-btn"></div>
          <div class="cab-btn"></div>
          <div class="cab-btn"></div>
        </div>
      </div>
    </div>
    <div class="player-card">
      <div class="arc-avatar" id="av-badge" style="font-size:26px;border-color:var(--accent);box-shadow:var(--gaccent)">
      </div>
      <div>
        <div class="player-name" id="p-name">Player</div>
        <div class="player-meta">3D Arcade &bull; Solo &amp; Head-to-Head</div>
      </div>
    </div>
    <!-- Unified multiplayer panel mount (Solo vs AI / Play a Friend) -->
    <div id="mp-panel-host" style="width:100%;max-width:560px;margin:0 auto 24px;"></div>
  </div>

  <script src="/js/substrates/avatar_picker.js"></script>
  <script src="/js/substrates/player_profile.js"></script>
  <script src="/js/substrates/game_manager.js?v=20260501"></script>
  <script src="/js/multiplayer-client.js"></script>
  <script src="/js/substrates/multiplayer_panel.js?v=20260430"></script>
  <script src="/js/substrates/game_setup.js?v=20260430"></script>
  <script>
    let username = localStorage.getItem('username') || 'Player';
    const av = AvatarPicker.get();
    document.getElementById('p-name').textContent = username;
    AvatarPicker.renderBadge(document.getElementById('nav-avatar'));
    const badge = document.getElementById('av-badge');
    badge.textContent = av ? av.emoji : '?';
    if (!av) badge.style.color = 'var(--np)';
    if (!AvatarPicker.has()) AvatarPicker.show(() => location.reload(), true);

    KGGameSetup.mount('#mp-panel-host', {
      gameId: 'brickbreaker3d',
      gameName: 'BrickBreaker 3D',
      minPlayers: 1,
      maxPlayers: 4,
      gamePath: '/brickbreaker3d/play.html',
      onLaunch: (summary) => {
        const playerCount = Math.max(1, Number(summary && summary.playerCount || 1));
        const mode = summary && summary.hasRemoteHumans ? 'private' : (playerCount > 1 ? 'multi' : 'solo');

        if (window.KGGameSetup && typeof window.KGGameSetup.persistGenericRuntime === 'function') {
          window.KGGameSetup.persistGenericRuntime(summary, {
            gameId: 'brickbreaker3d',
            gameName: 'BrickBreaker 3D',
            mode,
          });
          window.location.href = '/brickbreaker3d/play.html';
          return;
        }

        const code = summary && summary.code ? summary.code : '';
        if (mode === 'private') {
          window.location.href = '/brickbreaker3d/play.html?mode=private&code=' + encodeURIComponent(code) + '&players=' + playerCount;
        } else if (mode === 'multi') {
          window.location.href = '/brickbreaker3d/play.html?mode=multi&players=' + playerCount;
        } else {
          window.location.href = '/brickbreaker3d/play.html?mode=solo';
        }
      },
    });
  </script>
</body>

</html>
