<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrickBreaker 3D - Manifold Audio Edition</title>

  <script src="/js/require_auth.js"></script>
  <script>
    (async () => {
      const p = new URLSearchParams(window.location.search);
      const mode = (p.get('mode') || '').toLowerCase();
      const allowGuest = p.has('code');
      await window.KGRequireAuth.guard({
        allowGuest,
        // Solo vs AI should be publicly accessible.
        allowIf: () => mode === 'solo'
      });

      // Ensure a minimal local profile so gameplay UI doesn't hard-fail.
      try {
        if (!localStorage.getItem('username')) localStorage.setItem('username', 'Guest');
        if (!localStorage.getItem('display_name')) localStorage.setItem('display_name', localStorage.getItem('username') || 'Guest');
        if (!localStorage.getItem('kg_avatar')) localStorage.setItem('kg_avatar', JSON.stringify({ id: 'guest', emoji: '🎮' }));
      } catch (e) { /* ignore */ }
    })();
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      color: #00ffcc;
      font-family: 'Rajdhani', monospace;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100vh;
    }

    #title-overlay {
      position: fixed;
      top: 15px;
      width: 100%;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      font-family: 'Rajdhani', sans-serif;
    }

    #title-overlay h1 {
      font-size: 56px;
      letter-spacing: 4px;
      margin: 0;
      background: linear-gradient(90deg, #00ffcc 0%, #ffcc00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 10px rgba(0, 255, 204, 0.4));
    }

    #title-overlay .subtitle {
      color: #00ffcc;
      font-size: 14px;
      letter-spacing: 8px;
      margin-top: 2px;
      text-shadow: 0 0 8px rgba(0, 255, 204, 0.6);
    }

    #hud {
      position: fixed;
      bottom: 20px;
      right: 20px;
      text-align: right;
      color: #00ffcc;
      font-size: 18px;
      z-index: 100;
      text-shadow: 0 0 10px #00ffcc;
      font-weight: bold;
      top: auto;
      left: auto;
    }

    #hud div {
      margin-bottom: 12px;
    }

    #menu {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10, 10, 26, 0.95);
      padding: 60px;
      border: 2px solid #00ffcc;
      border-radius: 10px;
      text-align: center;
      z-index: 200;
      box-shadow: 0 0 30px #00ffcc;
    }

    #menu.hidden {
      display: none;
    }

    #menu h1 {
      color: #00ffcc;
      font-size: 48px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px #00ffcc;
      letter-spacing: 3px;
    }

    #menu .subtitle {
      color: #39ff14;
      font-size: 12px;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #39ff14;
      letter-spacing: 2px;
    }

    #menu button {
      display: block;
      width: 250px;
      padding: 15px;
      margin: 15px auto;
      background: linear-gradient(135deg, #00ffcc 0%, #39ff14 100%);
      border: none;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
      font-size: 16px;
      transition: all 0.3s;
    }

    #menu button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px #00ffcc;
    }

    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: #39ff14;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #39ff14;
    }
  </style>
  <script src="/js/analytics.js"></script>
</head>

<body>
  <canvas id="canvas"></canvas>

  <div id="title-overlay">
    <h1>BRICKBREAKER3D</h1>
    <div class="subtitle">MANIFOLD AUDIO EDITION</div>
  </div>

  <div id="hud"></div>
  <div id="menu">
    <h1>BRICKBREAKER3D</h1>
    <div class="subtitle">🌀 MANIFOLD AUDIO EDITION</div>
    <button onclick="startGame('easy')">🟢 Solo Easy (5 balls)</button>
    <button onclick="startGame('hard')">🔴 Solo Difficult (3 balls)</button>
    <button onclick="startGame('multi2')">👥 2 Players</button>
    <button onclick="startGame('multi3')">👥 3 Players</button>
    <button onclick="startGame('multi4')">👥 4 Players</button>
  </div>
  <div id="info">SPACE: Pause | ESC: Menu | MOUSE: Paddle | RIGHT-CLICK: Rotate | SCROLL: Zoom</div>

  <script src="../../lib/three/three.min.js"></script>
  <script src="../../lib/three/OrbitControls.js"></script>
  <script src="game.js"></script>
</body>

</html>
