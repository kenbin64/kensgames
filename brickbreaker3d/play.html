<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrickBreaker 3D - Manifold Audio Edition</title>

  <script>
    // Ensure a minimal local profile so gameplay UI doesn't hard-fail.
    try {
      if (!localStorage.getItem('username')) localStorage.setItem('username', 'Guest');
      if (!localStorage.getItem('display_name')) localStorage.setItem('display_name', localStorage.getItem('username') || 'Guest');
      if (!localStorage.getItem('kg_avatar')) localStorage.setItem('kg_avatar', JSON.stringify({ id: 'guest', emoji: '🎮' }));
    } catch (e) { /* ignore */ }
  </script>

  <!-- X-Dimensional Session Bridge -->
  <script src="/js/dimensional-session-bridge.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      color: #00ffcc;
      font-family: 'Rajdhani', monospace;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100vh;
    }

    #title-overlay {
      position: fixed;
      top: 15px;
      width: 100%;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      font-family: 'Rajdhani', sans-serif;
    }

    #title-overlay h1 {
      font-size: 56px;
      letter-spacing: 4px;
      margin: 0;
      background: linear-gradient(90deg, #00ffcc 0%, #ffcc00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 10px rgba(0, 255, 204, 0.4));
    }

    #title-overlay .subtitle {
      color: #00ffcc;
      font-size: 14px;
      letter-spacing: 8px;
      margin-top: 2px;
      text-shadow: 0 0 8px rgba(0, 255, 204, 0.6);
    }

    #hud {
      position: fixed;
      bottom: 20px;
      right: 20px;
      text-align: right;
      color: #00ffcc;
      font-size: 18px;
      z-index: 100;
      text-shadow: 0 0 10px #00ffcc;
      font-weight: bold;
      top: auto;
      left: auto;
    }

    #hud div {
      margin-bottom: 12px;
    }

    #menu {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10, 10, 26, 0.95);
      padding: 60px;
      border: 2px solid #00ffcc;
      border-radius: 10px;
      text-align: center;
      z-index: 200;
      box-shadow: 0 0 30px #00ffcc;
    }

    #menu.hidden {
      display: none;
    }

    #menu h1 {
      color: #00ffcc;
      font-size: 48px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px #00ffcc;
      letter-spacing: 3px;
    }

    #menu .subtitle {
      color: #39ff14;
      font-size: 12px;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #39ff14;
      letter-spacing: 2px;
    }

    #menu button {
      display: block;
      width: 250px;
      padding: 15px;
      margin: 15px auto;
      background: linear-gradient(135deg, #00ffcc 0%, #39ff14 100%);
      border: none;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
      font-size: 16px;
      transition: all 0.3s;
    }

    #menu button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px #00ffcc;
    }

    #info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: #39ff14;
      font-size: 12px;
      z-index: 100;
      text-shadow: 0 0 5px #39ff14;
    }

    #orientation-guard-bb {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(4, 8, 20, 0.94);
      backdrop-filter: blur(8px);
    }

    #orientation-guard-bb .og-card {
      width: min(92vw, 430px);
      border: 1px solid rgba(0, 255, 204, 0.45);
      border-radius: 12px;
      background: rgba(6, 18, 30, 0.96);
      text-align: center;
      padding: 18px;
      box-shadow: 0 0 28px rgba(0, 255, 204, 0.25);
    }

    #orientation-guard-bb .og-title {
      color: #00ffcc;
      font-size: 16px;
      letter-spacing: 2px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    #orientation-guard-bb .og-copy {
      color: #b7ece2;
      font-size: 12px;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    #orientation-guard-bb .og-btn {
      border: 1px solid rgba(0, 255, 204, 0.6);
      background: rgba(0, 95, 78, 0.4);
      color: #c8fff3;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
  <script src="/js/analytics.js"></script>
</head>

<body>
  <canvas id="canvas"></canvas>

  <div id="title-overlay">
    <h1>BRICKBREAKER3D</h1>
    <div class="subtitle">MANIFOLD AUDIO EDITION</div>
  </div>

  <div id="hud"></div>
  <div id="orientation-guard-bb" aria-live="polite">
    <div class="og-card">
      <div class="og-title">ROTATE TO LANDSCAPE</div>
      <div class="og-copy">BrickBreaker 3D keeps the full arena in view during horizontal play.</div>
      <button id="orientation-guard-bb-btn" class="og-btn" type="button">ENTER LANDSCAPE</button>
    </div>
  </div>
  <div id="menu">
    <h1>BRICKBREAKER3D</h1>
    <div class="subtitle">🌀 MANIFOLD AUDIO EDITION</div>
    <button onclick="startGame('easy')">🟢 Solo Easy (5 balls)</button>
    <button onclick="startGame('hard')">🔴 Solo Difficult (3 balls)</button>
    <button onclick="startGame('multi2')">👥 2 Players</button>
    <button onclick="startGame('multi3')">👥 3 Players</button>
    <button onclick="startGame('multi4')">👥 4 Players</button>
  </div>
  <div id="info">SPACE: Pause | ESC: Menu | MOUSE: Paddle | RIGHT-CLICK: Rotate | SCROLL: Zoom</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="game.js"></script>
  <script>
    (function enforceLandscapeBB() {
      const guard = document.getElementById('orientation-guard-bb');
      const btn = document.getElementById('orientation-guard-bb-btn');
      const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || ('ontouchstart' in window && Math.min(window.innerWidth, window.innerHeight) < 900);

      async function tryLockLandscape() {
        try {
          if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
            await document.documentElement.requestFullscreen();
          }
        } catch (_) { }
        try {
          if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape');
        } catch (_) { }
      }

      function updateGuard() {
        if (!isMobile) {
          guard.style.display = 'none';
          return;
        }
        const portrait = window.innerHeight > window.innerWidth;
        guard.style.display = portrait ? 'flex' : 'none';
      }

      btn.addEventListener('click', async () => {
        await tryLockLandscape();
        updateGuard();
      });

      window.addEventListener('orientationchange', updateGuard);
      window.addEventListener('resize', updateGuard);
      document.addEventListener('fullscreenchange', updateGuard);
      updateGuard();
    })();
  </script>
  <script>
    // Auto-launch from lobby intent: ?mode=solo | multi&players=N | private&code=X&players=N
    (function autoLaunchFromLobby() {
      try {
        const params = new URLSearchParams(location.search);
        let mode = params.get('mode');
        let playersFromObject = 0;

        // Object handoff support (preferred).
        if (!mode) {
          let kgGame = null;
          try { kgGame = JSON.parse(localStorage.getItem('KG_Game') || 'null'); } catch (_) { }
          const gameId = String((kgGame && kgGame.attrs && kgGame.attrs.game_id) || (kgGame && kgGame.game_id) || '');
          if (kgGame && gameId === 'brickbreaker3d') {
            mode = String(kgGame.mode || 'solo');
            playersFromObject = Math.max(2, Math.min(4, parseInt(kgGame.playerCount || '0', 10) || 0));
          }
        }

        if (!mode) return;
        const players = playersFromObject || Math.max(2, Math.min(4, parseInt(params.get('players') || '0', 10) || 0));
        const start = () => {
          if (typeof startGame !== 'function') return false;
          if (mode === 'solo') startGame('easy');
          else if (mode === 'multi' || mode === 'private') startGame('multi' + (players || 2));
          else return false;
          return true;
        };
        const tryStart = () => { if (!start()) setTimeout(tryStart, 50); };
        if (document.readyState === 'complete') tryStart();
        else window.addEventListener('load', tryStart, { once: true });
      } catch (e) { /* ignore */ }
    })();
  </script>

  <!-- ── Leave Game button ── -->
  <style>
    #btn-leave-game {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(8, 14, 28, 0.75);
      border: 1.5px solid rgba(255, 80, 80, 0.45);
      color: rgba(255, 160, 160, 0.85);
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
      line-height: 1;
    }

    #btn-leave-game:hover {
      background: rgba(180, 20, 20, 0.55);
      border-color: #ff5050;
      color: #fff;
    }
  </style>
  <button id="btn-leave-game" title="Leave Game" aria-label="Leave Game"
    onclick="if(confirm('Leave this game?')) window.location.href='/brickbreaker3d/lobby.html';">&times;</button>
</body>

</html>
