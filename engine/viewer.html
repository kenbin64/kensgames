<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manifold Viewer</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: monospace;
      overflow: hidden;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    /* HUD overlay */
    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #333;
      border-radius: 6px;
      padding: 12px 16px;
      min-width: 220px;
      backdrop-filter: blur(4px);
    }

    #hud h1 {
      font-size: 13px;
      letter-spacing: 0.1em;
      color: #7af;
      margin-bottom: 8px;
    }

    #hud p {
      font-size: 11px;
      color: #888;
      margin: 2px 0;
    }

    #hud .val {
      color: #cfc;
    }

    /* Manifold selector */
    #controls {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #333;
      border-radius: 6px;
      padding: 12px 16px;
      backdrop-filter: blur(4px);
    }

    #controls label {
      font-size: 11px;
      color: #888;
      display: block;
      margin-bottom: 4px;
    }

    #controls select,
    #controls input[type=range] {
      width: 180px;
      background: #1a1a1a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 4px 6px;
      font-family: monospace;
      font-size: 11px;
      margin-bottom: 8px;
    }

    #controls button {
      width: 100%;
      padding: 6px;
      background: #1e3a5f;
      border: 1px solid #2a5a9f;
      border-radius: 4px;
      color: #7af;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
    }

    #controls button:hover {
      background: #2a5a9f;
    }

    #status {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 10;
      font-size: 11px;
      color: #555;
    }

    #status.ok {
      color: #4c4;
    }

    #status.err {
      color: #c44;
    }
  </style>
</head>

<body>
  <div id="canvas-container"></div>

  <div id="hud">
    <h1>MANIFOLD VIEWER</h1>
    <p>Name: <span class="val" id="hud-name">—</span></p>
    <p>Vertices: <span class="val" id="hud-verts">—</span></p>
    <p>Faces: <span class="val" id="hud-faces">—</span></p>
    <p>Hash: <span class="val" id="hud-hash">—</span></p>
  </div>

  <div id="controls">
    <label>Manifold JSON path</label>
    <input id="json-path" type="text" value="/static/mountain.json" />

    <label>Wireframe</label>
    <input id="wireframe" type="range" min="0" max="1" step="1" value="0" />

    <label>Metalness</label>
    <input id="metalness" type="range" min="0" max="1" step="0.05" value="0.2" />

    <label>Roughness</label>
    <input id="roughness" type="range" min="0" max="1" step="0.05" value="0.8" />

    <button id="load-btn">Load Manifold</button>
  </div>

  <div id="status">ready</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.164/examples/jsm/controls/OrbitControls.js';

    // ---------------------------------------------------------------------------
    // Scene setup
    // ---------------------------------------------------------------------------
    const container = document.getElementById('canvas-container');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d0d0d);
    scene.fog = new THREE.Fog(0x0d0d0d, 8, 30);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.01, 1000);
    camera.position.set(0, -3, 2.5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // ---------------------------------------------------------------------------
    // Lighting
    // ---------------------------------------------------------------------------
    const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
    dirLight.position.set(2, 3, 4);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const rimLight = new THREE.DirectionalLight(0x3366ff, 0.5);
    rimLight.position.set(-3, -2, 1);
    scene.add(rimLight);

    // ---------------------------------------------------------------------------
    // Grid helper (subtle)
    // ---------------------------------------------------------------------------
    const grid = new THREE.GridHelper(6, 24, 0x222222, 0x222222);
    grid.rotation.x = Math.PI / 2;
    grid.position.z = -0.01;
    scene.add(grid);

    // ---------------------------------------------------------------------------
    // Controls
    // ---------------------------------------------------------------------------
    const orbit = new OrbitControls(camera, renderer.domElement);
    orbit.enableDamping = true;
    orbit.dampingFactor = 0.08;
    orbit.minDistance = 0.5;
    orbit.maxDistance = 20;

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // ---------------------------------------------------------------------------
    // Manifold mesh
    // ---------------------------------------------------------------------------
    let currentMesh = null;

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
    }

    /**
     * Verify the embedded SHA-256 hash before rendering.
     * Returns true if valid (or if no hash is present — unsigned assets pass through).
     */
    async function verifyHash(data) {
      if (!data.hash) return true;   // unsigned — allow

      const payload = { ...data };
      delete payload.hash;

      const canonical = JSON.stringify(
        Object.fromEntries(Object.entries(payload).sort()),
        null,
        undefined,
      ).replace(/\s+/g, '');          // compact, sorted

      const msgBuffer = new TextEncoder().encode(canonical);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const computed = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

      return computed === data.hash;
    }

    async function loadManifold(jsonPath) {
      setStatus('loading…');

      let data;
      try {
        const res = await fetch(jsonPath);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (err) {
        setStatus(`fetch error: ${err.message}`, 'err');
        return;
      }

      // Security: verify hash
      const valid = await verifyHash(data);
      if (!valid) {
        setStatus('hash mismatch — refusing to render', 'err');
        console.error('Manifold integrity check failed for', jsonPath);
        return;
      }

      // Build geometry
      const geometry = new THREE.BufferGeometry();

      const flatVerts = new Float32Array(data.vertices.flat());
      geometry.setAttribute('position', new THREE.BufferAttribute(flatVerts, 3));

      const flatIdx = new Uint32Array(data.faces.flat());
      geometry.setIndex(new THREE.BufferAttribute(flatIdx, 1));

      geometry.computeVertexNormals();

      // Material (driven by controls)
      const material = new THREE.MeshStandardMaterial({
        color: 0x2266ff,
        metalness: parseFloat(document.getElementById('metalness').value),
        roughness: parseFloat(document.getElementById('roughness').value),
        wireframe: document.getElementById('wireframe').value === '1',
        side: THREE.DoubleSide,
      });

      // Replace previous mesh
      if (currentMesh) {
        scene.remove(currentMesh);
        currentMesh.geometry.dispose();
        currentMesh.material.dispose();
      }
      currentMesh = new THREE.Mesh(geometry, material);
      currentMesh.castShadow = true;
      currentMesh.receiveShadow = true;
      scene.add(currentMesh);

      // Update HUD
      document.getElementById('hud-name').textContent = data.name ?? jsonPath.split('/').pop();
      document.getElementById('hud-verts').textContent = data.vertices.length.toLocaleString();
      document.getElementById('hud-faces').textContent = data.faces.length.toLocaleString();
      document.getElementById('hud-hash').textContent = data.hash
        ? data.hash.slice(0, 12) + '…'
        : 'unsigned';

      setStatus(`loaded — ${data.vertices.length} verts`, 'ok');
    }

    // ---------------------------------------------------------------------------
    // Control bindings
    // ---------------------------------------------------------------------------
    document.getElementById('load-btn').addEventListener('click', () => {
      const path = document.getElementById('json-path').value.trim();
      if (path) loadManifold(path);
    });

    ['metalness', 'roughness', 'wireframe'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        if (!currentMesh) return;
        const mat = currentMesh.material;
        mat.metalness = parseFloat(document.getElementById('metalness').value);
        mat.roughness = parseFloat(document.getElementById('roughness').value);
        mat.wireframe = document.getElementById('wireframe').value === '1';
        mat.needsUpdate = true;
      });
    });

    // ---------------------------------------------------------------------------
    // Animate
    // ---------------------------------------------------------------------------
    function animate() {
      requestAnimationFrame(animate);
      orbit.update();
      renderer.render(scene, camera);
    }
    animate();

    // ---------------------------------------------------------------------------
    // Auto-load on startup
    // ---------------------------------------------------------------------------
    loadManifold('/static/mountain.json');
  </script>
</body>

</html>
