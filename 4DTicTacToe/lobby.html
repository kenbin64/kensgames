<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4D TicTacToe Lobby &mdash; KensGames</title>
  <link rel="icon" href="/assets/images/logo/icon.png" type="image/png">
  <link rel="stylesheet" href="/lib/fonts/fonts.css">
  <link rel="stylesheet" href="/lib/arcade-theme.css">
  <link rel="stylesheet" href="/lib/hollywood-lobby.css">
  <style>
    :root {
      --accent: #00FFFF;
      --gaccent: 0 0 8px #00FFFF, 0 0 24px #00FFFF;
      --accent2: #9900FF;
      --gaccent2: 0 0 8px #9900FF, 0 0 24px #9900FF;
      --surface: rgba(1, 2, 14, 0.84);
      --surface-border: rgba(0, 180, 255, 0.16);
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 0%, rgba(0, 180, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(187, 0, 255, 0.08) 0%, transparent 60%),
        #000008;
    }

    .lobby-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 16px 22px;
      gap: 12px;
      position: relative;
      z-index: 4;
      min-height: 0;
      overflow: hidden;
    }

    #mp-panel-host {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      flex: 1;
      min-height: 0;
      display: flex;
    }

    .player-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 4px;
      padding: 12px 18px;
      margin-bottom: 28px;
      width: 100%;
      max-width: 520px;
    }

    .player-name {
      font-family: var(--fa);
      font-size: 13px;
      color: var(--accent);
      text-shadow: var(--gaccent);
    }

    .player-meta {
      font-size: 11px;
      color: var(--txm);
    }

    @media (max-height: 760px) {
      .lobby-wrap { padding: 10px 12px 10px; gap: 8px; }
      .player-card { padding: 8px 12px; margin-bottom: 8px; }
    }

    @media (max-width: 640px) {
      .lobby-wrap { padding: 10px 10px 12px; gap: 8px; }
      .player-card { padding: 8px 12px; gap: 10px; margin-bottom: 8px; }
      .player-name { font-size: 14px; }
      .player-meta { font-size: 11px; }
    }
  </style>
  <script src="/js/analytics.js"></script>
</head>

<body>
  <div id="tron-grid"></div>
  <div id="scanlines"></div>
  <nav class="arc-nav">
    <div class="arc-nav-inner">
      <a href="/" class="arc-logo"><img src="/assets/images/logo/icon.png" alt="KensGames"
          style="height:22px;width:auto;vertical-align:middle;margin-right:8px;">KEN<span>S</span>GAMES</a>
      <ul class="arc-nav-links">
        <li><a href="/">&#8592; Portal</a></li>
        <li><a href="/fasttrack/lobby.html">FastTrack</a></li>
        <li><a href="/starfighter/lobby.html">Alien Attack</a></li>
        <li><a href="/brickbreaker3d/lobby.html">BrickBreaker 3D</a></li>
      </ul>
      <div class="arc-nav-right" id="nav-avatar"></div>
    </div>
  </nav>
  <div class="lobby-wrap">
    <div class="hollywood-hills" aria-hidden="true"></div>
    <div class="hollywood-searchlights" aria-hidden="true"></div>
    <div class="player-card">
      <div class="arc-avatar" id="av-badge" style="font-size:26px;border-color:var(--accent);box-shadow:var(--gaccent)">
      </div>
      <div>
        <div class="player-name" id="p-name">Player</div>
        <div class="player-meta">4D Strategy &bull; Solo, Local &amp; Online</div>
      </div>
    </div>
    <div id="mp-panel-host"></div>
  </div>

  <div id="kg-player" data-profile-required="true" hidden></div>

  <script src="/js/substrates/avatar_picker.js"></script>
  <script src="/js/substrates/player_profile.js"></script>
  <script src="/js/substrates/game_manager.js?v=20260501"></script>
  <script>
    if (window.KGGameManager && typeof window.KGGameManager.loadRules === 'function') {
      window.KGGameManager.loadRules('4dtictactoe').catch(() => { });
    }
  </script>
  <script src="/js/multiplayer-client.js"></script>
  <script src="/js/substrates/multiplayer_panel.js?v=20260504d"></script>
  <script src="/js/substrates/game_setup.js?v=20260430"></script>
  <script>
    let username = localStorage.getItem('username') || 'Player';
    const av = AvatarPicker.get();
    document.getElementById('p-name').textContent = username;
    AvatarPicker.renderBadge(document.getElementById('nav-avatar'));
    const badge = document.getElementById('av-badge');
    badge.textContent = av ? av.emoji : '?';
    if (!av) badge.style.color = 'var(--np)';
    if (!AvatarPicker.has()) AvatarPicker.show(() => location.reload(), true);

    KGGameSetup.mount('#mp-panel-host', {
      gameId: '4dtictactoe',
      gameName: '4D TicTacToe',
      minPlayers: 1,
      maxPlayers: 4,
      gamePath: '/4DTicTacToe/index.html',
      onLaunch: (summary) => {
        const playerCount = Math.max(1, Number(summary && summary.playerCount || 1));
        const mode = summary && summary.hasRemoteHumans ? 'private' : (playerCount > 1 ? 'multi' : 'solo');
        if (window.KGGameSetup && typeof window.KGGameSetup.persistGenericRuntime === 'function') {
          window.KGGameSetup.persistGenericRuntime(summary, {
            gameId: '4dtictactoe',
            gameName: '4D TicTacToe',
            mode,
          });
        }
        window.location.href = '/4DTicTacToe/index.html';
      },
    });
  </script>
</body>

</html>
