<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alien Space Attack Lobby &mdash; KensGames</title>
  <link rel="icon" href="/assets/images/logo/icon.png" type="image/png">
  <link rel="stylesheet" href="/lib/fonts/fonts.css">
  <link rel="stylesheet" href="/lib/arcade-theme.css">
  <style>
    :root {
      --accent: #00FFFF;
      --gaccent: 0 0 8px #00FFFF, 0 0 24px #00FFFF;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .lobby-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .cabinet {
      width: 220px;
      margin: 0 auto 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp .5s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .cab-top {
      width: 160px;
      height: 14px;
      background: var(--accent);
      box-shadow: var(--gaccent);
      border-radius: 4px 4px 0 0;
    }

    .cab-body {
      width: 180px;
      background: rgba(2, 8, 20, .96);
      border: 2px solid var(--accent);
      box-shadow: var(--gaccent), inset 0 0 30px rgba(0, 255, 255, .06);
      border-radius: 0 0 8px 8px;
      padding: 20px 16px;
      text-align: center;
    }

    .cab-screen {
      width: 100%;
      height: 90px;
      background: #02040c;
      border: 2px solid rgba(0, 255, 255, .4);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-bottom: 12px;
      box-shadow: inset 0 0 20px rgba(0, 255, 255, .15);
      gap: 4px;
    }

    .cab-label {
      font-family: var(--fa);
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--accent);
      text-shadow: var(--gaccent);
      text-transform: uppercase;
    }

    .cab-buttons {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 10px;
    }

    .cab-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--ny);
      box-shadow: 0 0 6px var(--ny);
    }

    .cab-btn:nth-child(2) {
      background: var(--ng);
      box-shadow: 0 0 6px var(--ng);
    }

    .cab-btn:nth-child(3) {
      background: var(--np);
      box-shadow: 0 0 6px var(--np);
    }

    .invader-row {
      letter-spacing: 4px;
      color: var(--accent);
      text-shadow: var(--gaccent);
    }

    .player-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(0, 255, 255, .04);
      border: 1px solid rgba(0, 255, 255, .2);
      border-radius: 4px;
      padding: 12px 18px;
      margin-bottom: 28px;
      width: 100%;
      max-width: 520px;
    }

    .player-name {
      font-family: var(--fa);
      font-size: 13px;
      color: var(--accent);
      text-shadow: var(--gaccent);
    }

    .player-meta {
      font-size: 11px;
      color: var(--txm);
    }

    .online-count {
      margin-left: auto;
      text-align: right;
      font-family: var(--fa);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .online-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: var(--gaccent);
      margin-right: 5px;
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    /* Post-game registration prompt */
    .postgame-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0, 0, 0, .85);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
    }

    .postgame-modal.open {
      display: flex;
    }

    .postgame-box {
      background: rgba(4, 4, 20, .97);
      border: 2px solid var(--ny);
      box-shadow: 0 0 24px var(--ny);
      border-radius: 6px;
      padding: 36px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .postgame-title {
      font-family: var(--fa);
      font-size: 18px;
      color: var(--ny);
      text-shadow: 0 0 24px var(--ny);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .postgame-sub {
      font-size: 13px;
      color: var(--txm);
      margin-bottom: 24px;
      line-height: 1.7;
    }

    .postgame-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ── Desktop Download Banner ── */
    .download-banner {
      width: 100%;
      max-width: 740px;
      background: rgba(2, 8, 20, .92);
      border: 1px solid rgba(0, 255, 255, .18);
      border-radius: 6px;
      padding: 24px 28px;
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .dl-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dl-icon {
      font-size: 28px;
      filter: drop-shadow(0 0 8px #00FFFF);
    }

    .dl-title {
      font-family: var(--fa);
      font-size: 12px;
      color: var(--accent);
      text-shadow: 0 0 8px var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .dl-sub {
      font-size: 11px;
      color: var(--txm);
      margin-top: 2px;
      line-height: 1.6;
    }

    .dl-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      font-family: var(--fa);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      border: 1px solid rgba(0, 255, 255, .35);
      color: var(--accent);
      background: rgba(0, 255, 255, .04);
      transition: all .2s;
      cursor: pointer;
    }

    .dl-btn:hover {
      border-color: var(--accent);
      background: rgba(0, 255, 255, .10);
      box-shadow: 0 0 12px rgba(0, 255, 255, .25);
    }

    .dl-btn.unavail {
      opacity: .35;
      cursor: not-allowed;
      pointer-events: none;
    }
  </style>
  <script src="/js/analytics.js"></script>
</head>

<body>
  <div id="tron-grid"></div>
  <div id="scanlines"></div>
  <nav class="arc-nav">
    <div class="arc-nav-inner">
      <a href="/" class="arc-logo"><img src="/assets/images/logo/icon.png" alt="KensGames"
          style="height:22px;width:auto;vertical-align:middle;margin-right:8px;">KEN<span>S</span>GAMES</a>
      <ul class="arc-nav-links">
        <li><a href="/">&#8592; Portal</a></li>
        <li><a href="/fasttrack/lobby.html">FastTrack</a></li>
        <li><a href="/brickbreaker3d/lobby.html">BrickBreaker</a></li>
        <li><a href="/4DTicTacToe/">4D TicTacToe</a></li>
        <li><a href="/assemble/">Assemble</a></li>
      </ul>
      <div class="arc-nav-right" id="nav-avatar"></div>
    </div>
  </nav>
  <div class="lobby-wrap">
    <div class="cabinet">
      <div class="cab-top"></div>
      <div class="cab-body">
        <div class="cab-screen">
          <div class="invader-row">&#9650;&#9660;&#9650;&#9660;&#9650;&#9660;</div>
          <div class="invader-row" style="font-size:12px;letter-spacing:8px;">&#9650; &#9650; &#9650;</div>
          <div style="color:var(--ng);font-size:24px;margin-top:4px;">&#9650;</div>
        </div>
        <div class="cab-label">Alien Space Attack</div>
        <div class="cab-buttons">
          <div class="cab-btn"></div>
          <div class="cab-btn"></div>
          <div class="cab-btn"></div>
        </div>
      </div>
    </div>
    <div class="player-card">
      <div class="arc-avatar" id="av-badge" style="font-size:26px"></div>
      <div>
        <div class="player-name" id="p-name">Player</div>
        <div class="player-meta">First-Person Space Combat &bull; 3D</div>
      </div>

    </div>
    <!-- Unified multiplayer panel mount (Solo vs AI / Play a Friend) -->
    <div id="mp-panel-host" style="width:100%;max-width:560px;margin:0 auto 24px;"></div>
    <!-- Desktop Client Download Banner -->
    <div class="download-banner" id="dl-banner">
      <div class="dl-header">
        <span class="dl-icon">&#128187;</span>
        <div>
          <div class="dl-title">Desktop Client</div>
          <div class="dl-sub">Better performance &bull; Native fullscreen &bull; No browser required</div>
        </div>
      </div>
      <div class="dl-buttons" id="dl-buttons">
        <a class="dl-btn" href="/starfighter/downloads/Starfighter-Setup.exe" id="dl-win">
          <span>&#x229E;</span> Windows
        </a>
        <a class="dl-btn" href="/starfighter/downloads/Starfighter.dmg" id="dl-mac">
          &#63743; macOS
        </a>
        <a class="dl-btn" href="/starfighter/downloads/Starfighter.AppImage" id="dl-linux">
          &#128039; Linux
        </a>
      </div>
    </div>

  </div>

  <script src="/js/substrates/avatar_picker.js"></script>
  <script src="/js/substrates/player_profile.js"></script>
  <script src="/js/multiplayer-client.js"></script>
  <script src="/js/substrates/multiplayer_panel.js"></script>
  <script>
    let username = localStorage.getItem('username') || 'Pilot';
    const av = AvatarPicker.get();
    document.getElementById('p-name').textContent = username;
    AvatarPicker.renderBadge(document.getElementById('nav-avatar'));
    const badge = document.getElementById('av-badge');
    badge.textContent = av ? av.emoji : '?';
    if (!av) badge.style.color = 'var(--np)';
    if (!AvatarPicker.has()) AvatarPicker.show(() => location.reload(), true);

    // ── Desktop download banner ──────────────────────────────────
    // Hide entirely when already running inside Electron
    if (window.electronAPI && window.electronAPI.isDesktop) {
      document.getElementById('dl-banner').style.display = 'none';
    } else {
      // Probe each installer with HEAD; grey out files not yet published
      const dlFiles = [
        { id: 'dl-win', url: '/starfighter/downloads/Starfighter-Setup.exe' },
        { id: 'dl-mac', url: '/starfighter/downloads/Starfighter.dmg' },
        { id: 'dl-linux', url: '/starfighter/downloads/Starfighter.AppImage' },
      ];
      dlFiles.forEach(({ id, url }) => {
        fetch(url, { method: 'HEAD' }).then(r => {
          if (!r.ok) document.getElementById(id).classList.add('unavail');
        }).catch(() => document.getElementById(id).classList.add('unavail'));
      });
    }

    // Unified multiplayer panel: profile gate → mode chooser → roster build → launch.
    // On launch: stash resolved session for game-side reader (phase 2) and hand off via
    // the existing in-game URL contract so gameplay continues to work today.
    KGMultiplayerPanel.mount('#mp-panel-host', {
      gameId: 'starfighter',
      gameName: 'Alien Space Attack',
      minPlayers: 2,
      maxPlayers: 6,
      onLaunch: (session) => {
        try {
          sessionStorage.setItem('kg_session', JSON.stringify({
            session_id: session.session_id, session_code: session.session_code,
            game_id: session.game_id, host_id: session.host_id, my_user_id: session.my_user_id,
            is_host: session.is_host, players: session.players,
          }));
        } catch { /* ignore */ }
        const code = session.session_code;
        const hasHumans = (session.players || []).some(p => !p.is_ai && p.user_id !== session.my_user_id);
        if (hasHumans) {
          window.location.href = '/starfighter/index.html?mode=private&code=' + encodeURIComponent(code);
        } else {
          window.location.href = '/starfighter/index.html?mode=solo';
        }
      },
    });
  </script>
</body>

</html>
