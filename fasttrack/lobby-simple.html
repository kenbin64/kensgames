<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastTrack Lobby &mdash; KensGames</title>
  <link rel="icon" href="/assets/images/logo/icon.png" type="image/png">
  <link rel="stylesheet" href="/lib/fonts/fonts.css">
  <link rel="stylesheet" href="/lib/arcade-theme.css">
  <style>
    :root {
      /* FastTrack lobby leans on the canonical KensGames Tron palette:
         cyan primary, green for "go", purple for accents and AI. */
      --accent: #00FFFF;
      --gaccent: 0 0 8px #00FFFF, 0 0 24px #00FFFF;
      --surface: rgba(1, 2, 14, 0.84);
      --surface-border: rgba(0, 180, 255, 0.16);
    }

    /* Gyroid live background — same renderer the portal uses. */
    #gyroid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      opacity: 0.1;
      pointer-events: none;
      /* Prevent the canvas from contributing intrinsic size to the flex layout */
      flex-shrink: 0;
      flex-basis: 0;
      max-height: 0;
      overflow: hidden;
    }

    #tron-grid,
    #scanlines {
      display: none;
    }

    html,
    body {
      background-color: #000006 !important;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      background-color: #000006;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(0, 180, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(187, 0, 255, 0.08) 0%, transparent 60%);
    }

    .lobby-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 16px 24px;
      gap: 14px;
    }

    /* Cabinet art — small badge on desktop, hidden on phones so the setup
       panel is the first thing in the viewport. */
    .cabinet {
      width: 160px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp .5s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .cab-top {
      width: 110px;
      height: 10px;
      background: linear-gradient(90deg, #00ddff, #bb00ff);
      box-shadow: 0 0 8px rgba(0, 221, 255, 0.7), 0 0 16px rgba(187, 0, 255, 0.45);
      border-radius: 4px 4px 0 0;
    }

    .cab-body {
      width: 130px;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      box-shadow: inset 0 0 24px rgba(0, 180, 255, .08);
      border-radius: 0 0 8px 8px;
      padding: 12px 10px;
      text-align: center;
    }

    .cab-screen {
      width: 100%;
      height: 56px;
      background: #020210;
      border: 2px solid rgba(0, 255, 255, .4);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 12px;
      box-shadow: inset 0 0 20px rgba(0, 255, 65, .15);
    }

    .cab-label {
      font-family: var(--fa);
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--accent);
      text-shadow: var(--gaccent);
      text-transform: uppercase;
    }

    .cab-buttons {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 10px;
    }

    .cab-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--ny);
      box-shadow: 0 0 6px var(--ny);
    }

    .cab-btn:nth-child(2) {
      background: var(--np);
      box-shadow: 0 0 6px var(--np);
    }

    .cab-btn:nth-child(3) {
      background: var(--nc);
      box-shadow: 0 0 6px var(--nc);
    }

    /* Player card */
    .player-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 6px;
      padding: 10px 14px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 0 12px rgba(0, 180, 255, .12), inset 0 0 18px rgba(153, 0, 255, .04);
    }

    .player-name {
      font-family: var(--fa);
      font-size: 13px;
      color: var(--nc);
      text-shadow: var(--gc);
    }

    .player-meta {
      font-size: 11px;
      color: var(--txm);
    }

    .online-count {
      margin-left: auto;
      text-align: right;
      font-family: var(--fa);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .online-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: var(--gaccent);
      margin-right: 5px;
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    /* Mode cards */
    .modes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 740px;
      margin-bottom: 32px;
    }

    .mode-card {
      background: rgba(4, 20, 4, .9);
      border: 2px solid rgba(0, 255, 65, .25);
      border-radius: 6px;
      padding: 28px 22px;
      text-align: center;
      cursor: pointer;
      transition: all .25s;
    }

    .mode-card:hover {
      border-color: var(--accent);
      box-shadow: var(--gaccent), inset 0 0 20px rgba(0, 255, 65, .06);
      transform: translateY(-6px);
    }

    .mode-icon {
      font-size: 44px;
      margin-bottom: 14px;
      display: block;
      filter: drop-shadow(0 0 8px currentColor);
    }

    .mode-title {
      font-family: var(--fa);
      font-size: 14px;
      font-weight: 900;
      color: var(--accent);
      text-shadow: var(--gaccent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .mode-desc {
      font-size: 12px;
      color: var(--txm);
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .mode-avail {
      font-family: var(--fa);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--ng);
      text-transform: uppercase;
    }

    .mode-avail.locked {
      color: var(--np);
    }

    /* Private panel */
    .private-panel {
      display: none;
      width: 100%;
      max-width: 520px;
      background: rgba(4, 20, 4, .9);
      border: 2px solid rgba(0, 255, 65, .3);
      border-radius: 6px;
      padding: 28px;
    }

    .private-panel.open {
      display: block;
      animation: fadeUp .3s ease;
    }

    .priv-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 22px;
      border-bottom: 2px solid rgba(0, 255, 65, .2);
    }

    .priv-tab {
      font-family: var(--fa);
      font-size: 10px;
      letter-spacing: 2px;
      padding: 8px 16px;
      background: none;
      border: none;
      color: var(--txm);
      cursor: pointer;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all .2s;
    }

    .priv-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .code-display {
      font-family: var(--fa);
      font-size: 36px;
      letter-spacing: 8px;
      color: var(--accent);
      text-shadow: var(--gaccent);
      text-align: center;
      padding: 20px;
      background: rgba(0, 255, 65, .05);
      border: 1px solid rgba(0, 255, 65, .2);
      border-radius: 4px;
      margin-bottom: 14px;
      cursor: pointer;
    }

    .code-hint {
      font-size: 11px;
      color: var(--txm);
      text-align: center;
      margin-bottom: 16px;
    }

    /* Mobile: hide the cabinet art so the multiplayer setup panel is the
       first thing in the viewport — no scrolling required to start. */
    @media (max-width: 640px) {
      .cabinet {
        display: none;
      }

      .lobby-wrap {
        padding: 10px 10px 18px;
        gap: 10px;
      }

      .player-card {
        padding: 10px 14px;
        gap: 12px;
      }

      .player-name {
        font-size: 15px;
      }

      .player-meta {
        font-size: 12px;
      }

      .online-count {
        font-size: 12px;
      }

      .mode-title {
        font-size: 16px;
      }

      .mode-desc {
        font-size: 13px;
      }

      .mode-avail {
        font-size: 11px;
      }

      .priv-tab {
        font-size: 12px;
        padding: 9px 14px;
      }

      .code-display {
        font-size: 32px;
        letter-spacing: 6px;
      }

      .code-hint {
        font-size: 13px;
      }
    }

    @media (max-height: 700px) {
      .cabinet {
        width: 110px;
      }

      .cab-top {
        width: 80px;
        height: 8px;
      }

      .cab-body {
        width: 100px;
        padding: 8px 6px;
      }

      .cab-screen {
        height: 42px;
        font-size: 22px;
        margin-bottom: 6px;
      }
    }
  </style>
  <script src="/js/analytics.js"></script>
</head>

<body>
  <div id="tron-grid"></div>
  <div id="scanlines"></div>

  <nav class="arc-nav">
    <div class="arc-nav-inner">
      <a href="/" class="arc-logo">KEN<span>S</span>GAMES</a>
      <ul class="arc-nav-links">
        <li><a href="/">&#8592; Portal</a></li>
        <li><a href="/brickbreaker3d/lobby.html">BrickBreaker</a></li>
        <li><a href="/starfighter/lobby.html?v=20260501">Alien Attack</a></li>
      </ul>
      <div class="arc-nav-right" id="nav-avatar"></div>
    </div>
  </nav>

  <div class="lobby-wrap">
    <!-- Arcade Cabinet Art -->
    <div class="cabinet">
      <div class="cab-top"></div>
      <div class="cab-body">
        <div class="cab-screen">&#9646;&#9646;&#9644;&#9645;&#9646;&#9646;</div>
        <div class="cab-label">FastTrack</div>
        <div class="cab-buttons">
          <div class="cab-btn"></div>
          <div class="cab-btn"></div>
          <div class="cab-btn"></div>
        </div>
      </div>
    </div>

    <!-- Player card -->
    <div class="player-card">
      <div class="arc-avatar" id="av-badge" style="font-size:26px"></div>
      <div>
        <div class="player-name" id="p-name">Player</div>
        <div class="player-meta">Strategy Board Game &bull; 2&ndash;6 Players</div>
      </div>
      <div class="online-count">
        <div><span class="online-dot"></span>Ready to play</div>
      </div>
    </div>

    <!-- Unified multiplayer panel mount -->
    <div id="mp-panel-host" style="width:100%;max-width:560px;margin:0 auto;"></div>
  </div>

  <!-- Lightweight profile gate: prompts for name + avatar on first visit. -->
  <div id="kg-player" data-profile-required="true" hidden></div>

  <script src="/js/substrates/avatar_picker.js?v=20260501"></script>
  <script src="/js/substrates/player_profile.js"></script>
  <script src="/js/substrates/game.js?v=20260501"></script>
  <script src="/js/substrates/player.js?v=20260501"></script>
  <script src="/fasttrack/fasttrack-game.js?v=20260501"></script>
  <script src="/js/substrates/game_manager.js?v=20260501"></script>
  <script>
    if (window.KGGameManager && typeof window.KGGameManager.loadRules === 'function') {
      window.KGGameManager.loadRules('fasttrack').catch(() => { });
    }
  </script>
  <script src="/js/multiplayer-client.js?v=20260501"></script>
  <script src="/js/substrates/multiplayer_panel.js?v=20260501h"></script>
  <script src="/js/substrates/game_setup.js?v=20260501h"></script>
  <script>
    let username = localStorage.getItem('username') || localStorage.getItem('display_name') || '';
    const av = AvatarPicker.get();

    document.getElementById('p-name').textContent = username || 'Choose a name when you play';
    AvatarPicker.renderBadge(document.getElementById('nav-avatar'));
    const badge = document.getElementById('av-badge');
    badge.textContent = av ? av.emoji : '?';
    if (!av) badge.style.color = 'var(--np)';

    // Unified multiplayer panel: profile gate → mode chooser → roster build → launch.
    // On launch: stash resolved session for game-side reader (phase 2) and hand off via
    // the existing in-game URL contract so gameplay continues to work today.
    KGGameSetup.mount('#mp-panel-host', {
      gameId: 'fasttrack',
      gameName: 'FastTrack',
      supportsSameScreen: true,
      minPlayers: 2,
      maxPlayers: 6,
      gamePath: '/fasttrack/3d.html',
      onLaunch: (summary) => {
        // Preferred path: build Player[] and inject into FastTrackGame,
        // then persist canonical runtime + legacy compatibility keys.
        const isSameScreen = summary && summary.launchMode === 'same-screen';
        const runtime = KGGameSetup.persistFastTrackRuntime(summary, {
          mode: isSameScreen ? 'same-screen' : (summary && summary.hasRemoteHumans ? 'private' : 'solo'),
        });

        if (runtime) {
          window.location.href = '/fasttrack/3d.html';
          return;
        }

        // Fallback if manager/classes are unavailable — persist full roster manually.
        const launchMode = summary && summary.launchMode;
        const code = summary && summary.code ? summary.code : null;
        const players = (summary && summary.players) || [];
        const me = (summary && summary.me) || players[0] || {};
        const KG_Game = {
          x: 'fasttrack:' + Date.now(),
          mode: isSameScreen ? 'same-screen' : ((summary && summary.hasRemoteHumans && code) ? 'private' : 'solo'),
          code: (summary && summary.hasRemoteHumans && code) ? code : null,
          playerCount: Math.max(2, Number(summary && summary.playerCount || 2)),
          aiDifficulty: 'normal',
        };
        const KG_Player = {
          x: (me && me.user_id) || localStorage.getItem('username') || ('player:' + Date.now()),
          name: (me && me.username) || localStorage.getItem('username') || localStorage.getItem('display_name') || 'Player',
          avatar: (me && (me.avatar_id || me.avatar)) || (AvatarPicker.get() && AvatarPicker.get().emoji) || '🎮',
        };
        localStorage.setItem('KG_Game', JSON.stringify(KG_Game));
        localStorage.setItem('KG_Player', JSON.stringify(KG_Player));
        // Persist full roster so the game can read all players.
        if (players.length > 0) {
          try {
            sessionStorage.setItem('ft_session_players', JSON.stringify(players.map(p => ({
              user_id: p.user_id,
              username: p.username || p.name,
              avatar: p.avatar_id || p.avatar || '👤',
              is_ai: !!p.is_ai,
              is_host: !!p.is_host,
            }))));
          } catch (_) { }
        }

        window.location.href = '/fasttrack/3d.html';
      },
    });
  </script>
</body>

</html>
