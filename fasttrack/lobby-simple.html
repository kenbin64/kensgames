<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastTrack Lobby &mdash; KensGames</title>
  <link rel="icon" href="/assets/images/logo/icon.png" type="image/png">
  <link rel="stylesheet" href="/lib/fonts/fonts.css">
  <link rel="stylesheet" href="/lib/arcade-theme.css">
  <style>
    :root {
      --accent: #00FF41;
      --gaccent: 0 0 8px #00FF41, 0 0 24px #00FF41;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .lobby-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* Cabinet art */
    .cabinet {
      width: 220px;
      margin: 0 auto 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp .5s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .cab-top {
      width: 160px;
      height: 14px;
      background: var(--accent);
      box-shadow: var(--gaccent);
      border-radius: 4px 4px 0 0;
    }

    .cab-body {
      width: 180px;
      background: rgba(4, 20, 4, .96);
      border: 2px solid var(--accent);
      box-shadow: var(--gaccent), inset 0 0 30px rgba(0, 255, 65, .06);
      border-radius: 0 0 8px 8px;
      padding: 20px 16px;
      text-align: center;
    }

    .cab-screen {
      width: 100%;
      height: 90px;
      background: #020c02;
      border: 2px solid rgba(0, 255, 65, .4);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      margin-bottom: 12px;
      box-shadow: inset 0 0 20px rgba(0, 255, 65, .15);
    }

    .cab-label {
      font-family: var(--fa);
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--accent);
      text-shadow: var(--gaccent);
      text-transform: uppercase;
    }

    .cab-buttons {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 10px;
    }

    .cab-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--ny);
      box-shadow: 0 0 6px var(--ny);
    }

    .cab-btn:nth-child(2) {
      background: var(--np);
      box-shadow: 0 0 6px var(--np);
    }

    .cab-btn:nth-child(3) {
      background: var(--nc);
      box-shadow: 0 0 6px var(--nc);
    }

    /* Player card */
    .player-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(0, 255, 65, .05);
      border: 1px solid rgba(0, 255, 65, .2);
      border-radius: 4px;
      padding: 12px 18px;
      margin-bottom: 28px;
      width: 100%;
      max-width: 520px;
    }

    .player-name {
      font-family: var(--fa);
      font-size: 13px;
      color: var(--accent);
      text-shadow: var(--gaccent);
    }

    .player-meta {
      font-size: 11px;
      color: var(--txm);
    }

    .online-count {
      margin-left: auto;
      text-align: right;
      font-family: var(--fa);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .online-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: var(--gaccent);
      margin-right: 5px;
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    /* Mode cards */
    .modes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 740px;
      margin-bottom: 32px;
    }

    .mode-card {
      background: rgba(4, 20, 4, .9);
      border: 2px solid rgba(0, 255, 65, .25);
      border-radius: 6px;
      padding: 28px 22px;
      text-align: center;
      cursor: pointer;
      transition: all .25s;
    }

    .mode-card:hover {
      border-color: var(--accent);
      box-shadow: var(--gaccent), inset 0 0 20px rgba(0, 255, 65, .06);
      transform: translateY(-6px);
    }

    .mode-icon {
      font-size: 44px;
      margin-bottom: 14px;
      display: block;
      filter: drop-shadow(0 0 8px currentColor);
    }

    .mode-title {
      font-family: var(--fa);
      font-size: 14px;
      font-weight: 900;
      color: var(--accent);
      text-shadow: var(--gaccent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .mode-desc {
      font-size: 12px;
      color: var(--txm);
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .mode-avail {
      font-family: var(--fa);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--ng);
      text-transform: uppercase;
    }

    .mode-avail.locked {
      color: var(--np);
    }

    /* Private panel */
    .private-panel {
      display: none;
      width: 100%;
      max-width: 520px;
      background: rgba(4, 20, 4, .9);
      border: 2px solid rgba(0, 255, 65, .3);
      border-radius: 6px;
      padding: 28px;
    }

    .private-panel.open {
      display: block;
      animation: fadeUp .3s ease;
    }

    .priv-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 22px;
      border-bottom: 2px solid rgba(0, 255, 65, .2);
    }

    .priv-tab {
      font-family: var(--fa);
      font-size: 10px;
      letter-spacing: 2px;
      padding: 8px 16px;
      background: none;
      border: none;
      color: var(--txm);
      cursor: pointer;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all .2s;
    }

    .priv-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .code-display {
      font-family: var(--fa);
      font-size: 36px;
      letter-spacing: 8px;
      color: var(--accent);
      text-shadow: var(--gaccent);
      text-align: center;
      padding: 20px;
      background: rgba(0, 255, 65, .05);
      border: 1px solid rgba(0, 255, 65, .2);
      border-radius: 4px;
      margin-bottom: 14px;
      cursor: pointer;
    }

    .code-hint {
      font-size: 11px;
      color: var(--txm);
      text-align: center;
      margin-bottom: 16px;
    }
  </style>
  <script src="/js/analytics.js"></script>
</head>

<body>
  <div id="tron-grid"></div>
  <div id="scanlines"></div>

  <nav class="arc-nav">
    <div class="arc-nav-inner">
      <a href="/" class="arc-logo">KEN<span>S</span>GAMES</a>
      <ul class="arc-nav-links">
        <li><a href="/">&#8592; Portal</a></li>
        <li><a href="/brickbreaker3d/lobby.html">BrickBreaker</a></li>
        <li><a href="/starfighter/lobby.html">Alien Attack</a></li>
      </ul>
      <div class="arc-nav-right" id="nav-avatar"></div>
    </div>
  </nav>

  <div class="lobby-wrap">
    <!-- Arcade Cabinet Art -->
    <div class="cabinet">
      <div class="cab-top"></div>
      <div class="cab-body">
        <div class="cab-screen">&#9646;&#9646;&#9644;&#9645;&#9646;&#9646;</div>
        <div class="cab-label">FastTrack</div>
        <div class="cab-buttons">
          <div class="cab-btn"></div>
          <div class="cab-btn"></div>
          <div class="cab-btn"></div>
        </div>
      </div>
    </div>

    <!-- Player card -->
    <div class="player-card">
      <div class="arc-avatar" id="av-badge" style="font-size:26px"></div>
      <div>
        <div class="player-name" id="p-name">Player</div>
        <div class="player-meta">Strategy Board Game &bull; 2&ndash;4 Players</div>
      </div>
      <div class="online-count">
        <div><span class="online-dot"></span>Ready to play</div>
      </div>
    </div>

    <!-- Unified multiplayer panel mount -->
    <div id="mp-panel-host" style="width:100%;max-width:560px;margin:0 auto;"></div>
  </div>

  <script src="/js/substrates/avatar_picker.js"></script>
  <script src="/js/substrates/player_profile.js"></script>
  <script src="/js/multiplayer-client.js"></script>
  <script src="/js/substrates/multiplayer_panel.js"></script>
  <script>
    let username = localStorage.getItem('username') || localStorage.getItem('display_name') || 'Guest';
    const av = AvatarPicker.get();

    document.getElementById('p-name').textContent = username;
    AvatarPicker.renderBadge(document.getElementById('nav-avatar'));
    const badge = document.getElementById('av-badge');
    badge.textContent = av ? av.emoji : '?';
    if (!av) badge.style.color = 'var(--np)';

    // Unified multiplayer panel: profile gate → mode chooser → roster build → launch.
    // On launch: stash resolved session for game-side reader (phase 2) and hand off via
    // the existing in-game URL contract so gameplay continues to work today.
    KGMultiplayerPanel.mount('#mp-panel-host', {
      gameId: 'fasttrack',
      gameName: 'FastTrack',
      minPlayers: 2,
      maxPlayers: 4,
      onLaunch: (session) => {
        try {
          sessionStorage.setItem('kg_session', JSON.stringify({
            session_id: session.session_id, session_code: session.session_code,
            game_id: session.game_id, host_id: session.host_id, my_user_id: session.my_user_id,
            is_host: session.is_host, players: session.players,
          }));
        } catch { /* ignore */ }
        const code = session.session_code;
        const isHost = session.is_host;
        const hasHumans = (session.players || []).some(p => !p.is_ai && p.user_id !== session.my_user_id);
        if (hasHumans) {
          window.location.href = `/fasttrack/index.html?mode=private&code=${code}${isHost ? '&host=1' : ''}`;
        } else {
          window.location.href = `/fasttrack/index.html?mode=solo`;
        }
      },
    });
  </script>
</body>

</html>
