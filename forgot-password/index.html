<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - KensGames</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 450px;
      padding: 40px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon {
      text-align: center;
      font-size: 50px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input[type="email"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="email"]:focus {
      outline: none;
      border-color: #667eea;
    }

    .feedback {
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    .feedback.show {
      display: block;
    }

    .feedback.valid {
      color: #3c3;
    }

    .feedback.invalid {
      color: #c33;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: #666;
      font-size: 14px;
    }

    .loading.show {
      display: block;
    }

    .link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }

    .link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .link a:hover {
      text-decoration: underline;
    }

    .info-box {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.5;
    }
  </style>
  <script src="/js/analytics.js"></script>
</head>

<body>
  <div class="container">
    <div class="icon">🔐</div>
    <h1>Forgot Password?</h1>
    <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>

    <div class="info-box">
      Recovery link will expire in 15 minutes. Check your spam folder if you don't see the email.
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <form id="recoveryForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email" />
        <div class="feedback" id="emailFeedback"></div>
      </div>

      <div class="button-group">
        <button type="submit" class="btn-primary" id="submitBtn">Send Recovery Link</button>
        <button type="button" class="btn-secondary" onclick="window.location.href='/login'">
          Back to Login
        </button>
      </div>

      <div class="loading" id="loading">
        <span>Sending recovery email...</span>
      </div>
    </form>

    <div class="link">
      <a href="/login">← Back to login</a>
    </div>
  </div>

  <script>
    const API_URL = '/api/auth';

    // Email validation
    document.getElementById('email').addEventListener('input', validateEmail);
    function validateEmail() {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const feedback = document.getElementById('emailFeedback');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (email.length === 0) {
        feedback.classList.remove('show');
        return;
      }

      if (!emailRegex.test(email)) {
        feedback.textContent = '❌ Invalid email format';
        feedback.classList.add('show', 'invalid');
        feedback.classList.remove('valid');
      } else {
        feedback.textContent = '✓ Email looks good';
        feedback.classList.add('show', 'valid');
        feedback.classList.remove('invalid');
      }
    }

    // Form submission
    document.getElementById('recoveryForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim().toLowerCase();

      // Clear messages
      document.getElementById('errorMessage').classList.remove('show');
      document.getElementById('successMessage').classList.remove('show');

      // Show loading
      document.getElementById('loading').classList.add('show');
      document.getElementById('submitBtn').disabled = true;

      try {
        const response = await fetch(`${API_URL}/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email })
        });

        const data = await response.json();

        if (data.success) {
          document.getElementById('successMessage').innerHTML = '<strong>✓ Recovery email sent!</strong><br>Check your inbox for a link to reset your password. Link expires in 15 minutes.';
          document.getElementById('successMessage').classList.add('show');

          // Clear form
          document.getElementById('recoveryForm').reset();

          // Redirect after delay
          setTimeout(() => {
            window.location.href = '/login';
          }, 3000);
        } else {
          throw new Error(data.error || 'Failed to send recovery email');
        }
      } catch (error) {
        console.error('Recovery error:', error);
        document.getElementById('errorMessage').textContent = error.message;
        document.getElementById('errorMessage').classList.add('show');
      } finally {
        document.getElementById('loading').classList.remove('show');
        document.getElementById('submitBtn').disabled = false;
      }
    });

    // Check if already logged in
    window.addEventListener('load', () => {
      if (localStorage.getItem('user_token')) {
        window.location.href = '/lobby';
      }
    });
  </script>
</body>

</html>
