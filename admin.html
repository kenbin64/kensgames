<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ken's Arcade — Admin</title>
    <link rel="stylesheet" href="arcade.css">
    <style>
        .admin-wrap {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .admin-header h1 {
            font-size: 1rem;
            color: var(--purple);
            text-shadow: 0 0 15px var(--purple);
        }

        /* Stats cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--panel);
            border: 1px solid #333;
            padding: 1rem;
            text-align: center;
        }

        .stat-card .stat-val {
            font-size: 1.5rem;
            color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan);
        }

        .stat-card .stat-label {
            font-size: 0.45rem;
            color: var(--dim);
            margin-top: 0.3rem;
        }

        /* User table */
        .user-table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.55rem;
        }

        th {
            text-align: left;
            padding: 0.6rem;
            color: var(--green);
            border-bottom: 2px solid var(--green);
            font-size: 0.5rem;
        }

        td {
            padding: 0.5rem 0.6rem;
            border-bottom: 1px solid #222;
        }

        tr:hover {
            background: rgba(0, 255, 255, 0.03);
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }

        .online-dot.on {
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }

        .online-dot.off {
            background: #333;
        }

        .role-badge {
            padding: 0.2rem 0.5rem;
            font-size: 0.4rem;
            border-radius: 2px;
            letter-spacing: 1px;
        }

        .role-badge.superuser {
            background: var(--purple);
            color: #fff;
        }

        .role-badge.admin {
            background: var(--cyan);
            color: var(--dark);
        }

        .role-badge.member {
            background: #333;
            color: var(--dim);
        }

        .action-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.4rem;
            padding: 0.3rem 0.5rem;
            cursor: pointer;
            border: 1px solid;
            background: transparent;
            margin: 0 2px;
        }

        .action-btn.promote {
            color: var(--cyan);
            border-color: var(--cyan);
        }

        .action-btn.promote:hover {
            background: var(--cyan);
            color: var(--dark);
        }

        .action-btn.demote {
            color: #ff8800;
            border-color: #ff8800;
        }

        .action-btn.demote:hover {
            background: #ff8800;
            color: var(--dark);
        }

        .action-btn.kick {
            color: #ff4444;
            border-color: #ff4444;
        }

        .action-btn.kick:hover {
            background: #ff4444;
            color: #fff;
        }

        .search-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .search-bar input {
            flex: 1;
            padding: 0.5rem;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.5rem;
            background: var(--dark);
            color: var(--text);
            border: 1px solid #333;
        }

        .search-bar input:focus {
            border-color: var(--cyan);
            outline: none;
        }

        .no-access {
            text-align: center;
            padding: 4rem;
            color: var(--dim);
            font-size: 0.7rem;
        }

        /* Kick modal */
        #kick-modal .modal-box {
            border-color: #ff4444;
        }

        #kick-modal .modal-title {
            color: #ff4444;
        }

        .kick-target {
            color: var(--cyan);
            font-size: 0.7rem;
            margin: 1rem 0;
        }
    </style>
    <script src="/js/analytics.js"></script>
</head>

<body>
    <div class="scanlines"></div>
    <header class="arcade-header">
        <a href="/" style="text-decoration:none">
            <div class="logo glitch" data-text="KEN'S ARCADE">KEN'S ARCADE</div>
        </a>
        <nav class="header-nav">
            <span id="admin-user" class="player-tag"></span>
            <a href="/" class="arcade-btn">BACK TO ARCADE</a>
            <button class="arcade-btn" onclick="adminLogout()"
                style="color:#ff4444;border-color:#ff4444">LOGOUT</button>
        </nav>
    </header>

    <div class="admin-wrap">
        <!-- No access message (shown if not admin) -->
        <div id="no-access" class="no-access hidden">
            <p>⛔ ACCESS DENIED</p>
            <p style="font-size:0.45rem;margin-top:1rem">You must be an admin or superuser to view this page.</p>
            <a href="/" class="arcade-btn" style="margin-top:1rem;display:inline-block">RETURN TO ARCADE</a>
        </div>

        <!-- Admin panel (shown if admin/superuser) -->
        <div id="admin-panel" class="hidden">
            <div class="admin-header">
                <h1>⚡ ADMIN PANEL</h1>
                <span id="my-role" class="role-badge"></span>
            </div>

            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-val" id="stat-users">-</div>
                    <div class="stat-label">TOTAL USERS</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="stat-online">-</div>
                    <div class="stat-label">ONLINE</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="stat-sessions">-</div>
                    <div class="stat-label">ACTIVE GAMES</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="stat-guilds">-</div>
                    <div class="stat-label">GUILDS</div>
                </div>
            </div>

            <!-- User management -->
            <div class="search-bar">
                <input type="text" id="user-search" placeholder="SEARCH USERS..." oninput="filterUsers()">
            </div>

            <div class="user-table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>STATUS</th>
                            <th>USERNAME</th>
                            <th>ROLE</th>
                            <th>GAMES</th>
                            <th>W/L</th>
                            <th>JOINED</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="user-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Kick confirmation modal -->
    <div id="kick-modal" class="modal hidden">
        <div class="modal-box">
            <button class="modal-close" onclick="hideKickModal()">✕</button>
            <h2 class="modal-title">⚠ KICK PLAYER</h2>
            <p class="kick-target">Kick <span id="kick-username"></span>?</p>
            <div><label>REASON (optional)</label><input type="text" id="kick-reason" placeholder="Reason..."></div>
            <button class="arcade-btn kick full-width" style="margin-top:1rem;border-color:#ff4444;color:#ff4444"
                onclick="confirmKick()">CONFIRM KICK</button>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
